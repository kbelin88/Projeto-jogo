<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto Jogo - Arena de Benchmark</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #2b2014; font-family: "Trebuchet MS", Verdana, sans-serif; }
  #map { display: block; width: 100vw; height: 100vh; cursor: grab; }
  #map.dragging { cursor: grabbing; }

  /* HUD */
  .hud {
    position: fixed; pointer-events: none; color: #f5e9c8;
    text-shadow: 1px 1px 2px #000; font-size: 13px; user-select: none;
  }
  #zoombar {
    bottom: 10px; right: 10px; pointer-events: auto;
    display: flex; flex-direction: column; gap: 6px;
  }
  /* ===== PAINEIS DOS REIS (um de cada lado) ===== */
  .painel {
    position: fixed; top: 0; width: 272px; height: 100vh; z-index: 6;
    display: flex; flex-direction: column;
    background: linear-gradient(180deg, #2a1f12 0%, #1e1509 100%);
    color: #f0e3c0; transition: transform .25s ease;
  }
  #sidebar  { right: 0; border-left: 2px solid #6b4a22; box-shadow: -8px 0 22px rgba(0,0,0,.5); }
  #sidebarA { left: 0;  border-right: 2px solid #6b4a22; box-shadow: 8px 0 22px rgba(0,0,0,.5); }
  body.sb-closed #sidebar  { transform: translateX(100%); }
  body.sb-closed #sidebarA { transform: translateX(-100%); }
  .p-head { padding: 12px 14px 10px; border-bottom: 2px solid #6b4a22; background: rgba(0,0,0,.18); }
  .p-head.a { border-top: 4px solid #4a7ce0; }
  .p-head.b { border-top: 4px solid #d84a4a; }
  .p-title {
    font-variant: small-caps; letter-spacing: .1em; font-weight: bold;
    font-size: 16px; text-shadow: 1px 1px 2px #000;
  }
  .p-head.a .p-title { color: #9db8f5; }
  .p-head.b .p-title { color: #f59d9d; }
  .p-modelo { font: 11px Consolas, monospace; color: #b0a58a; margin-top: 2px; }
  .p-stats { font-size: 12px; color: #d9a441; margin-top: 5px; }
  .mono { font-family: Consolas, monospace; }
  .p-feed { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #6b4a22 #1e1509; }
  .p-feed:empty::after {
    content: "As jogadas deste rei aparecem aqui.";
    display: block; padding: 14px; font-size: 12px; color: #8f8468; font-style: italic;
  }
  .ent { border-bottom: 1px solid rgba(107,74,34,.35); padding: 8px 12px; font-size: 12px; line-height: 1.55; }
  .ent-t { font-variant: small-caps; letter-spacing: .06em; color: #d9a441; font-weight: bold; margin-bottom: 2px; }
  .ent-m { color: #8f8468; font: 10px Consolas, monospace; letter-spacing: 0; }
  .ent .rej { color: #e08a7a; }
  .ent .plc { color: #b0a58a; font-size: 11px; margin-top: 3px; }
  .bd {
    font: bold 10px Consolas, monospace; padding: 1px 5px; border-radius: 4px;
    white-space: nowrap;
  }
  .bd.certo  { background: #2f5a23; color: #a8e58c; }
  .bd.errado { background: #5a2323; color: #f0a49a; }
  .bd.neutro { background: #4a4232; color: #cfc4a4; }
  .ent .ev { border-left: 3px solid #6b4a22; padding-left: 7px; margin: 2px 0; font-size: 13px; }
  .ent .evA { border-left-color: #5d8cf0; }
  .ent .evB { border-left-color: #ef5d5d; }
  #sb-toggle {
    position: fixed; top: 12px; right: 312px; z-index: 7; width: 34px; height: 34px;
    font-size: 15px; color: #f5e9c8; background: linear-gradient(#7a5226,#523414);
    border: 2px solid #2b1a0a; border-radius: 8px 0 0 8px; cursor: pointer;
    transition: right .25s ease;
  }
  body.sb-closed #sb-toggle { right: 0; }
  /* ===== BANNER DE EVENTO (replay) ===== */
  #banner {
    position: fixed; top: 64px; left: 50%; transform: translateX(-50%) translateY(-16px);
    z-index: 8; padding: 10px 26px; opacity: 0; pointer-events: none;
    background: linear-gradient(180deg, rgba(43,32,20,.94), rgba(30,21,9,.94));
    border: 2px solid #d9a441; border-radius: 8px;
    color: #f5e9c8; font: bold 17px 'Trebuchet MS', sans-serif;
    font-variant: small-caps; letter-spacing: .06em;
    text-shadow: 1px 1px 2px #000; box-shadow: 0 6px 24px rgba(0,0,0,.5);
    transition: opacity .3s ease, transform .3s ease;
  }
  #banner.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ===== PLACAR DE TRANSMISSAO (esports, replay/cinema) ===== */
  #placarTop {
    position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
    z-index: 7; flex-direction: column; min-width: 520px;
    background: linear-gradient(180deg, rgba(43,32,20,.95), rgba(30,21,9,.95));
    border: 2px solid #6b4a22; border-radius: 10px; overflow: hidden;
    box-shadow: 0 6px 24px rgba(0,0,0,.55); color: #f0e3c0;
    font: 14px 'Trebuchet MS', sans-serif;
  }
  #placarTop { display: flex; } /* placar sempre visivel: e o estado da batalha */
  .pt-linha { display: flex; align-items: stretch; }
  .pt-lado { flex: 1; display: flex; align-items: center; gap: 10px; padding: 8px 14px; }
  .pt-lado.b { flex-direction: row-reverse; text-align: right; }
  .pt-lado.a { background: linear-gradient(90deg, rgba(59,99,196,.34), transparent); }
  .pt-lado.b { background: linear-gradient(270deg, rgba(196,59,59,.34), transparent); }
  .pt-nome { font-weight: bold; font-variant: small-caps; letter-spacing: .05em; font-size: 16px; }
  .pt-nome small { display: block; font: 10px Consolas, monospace; letter-spacing: 0; color: #b0a58a; text-transform: none; }
  .pt-num { font: bold 18px Consolas, monospace; }
  .pt-ald { font: 11px Consolas, monospace; color: #cfc4a4; }
  #pt-turno {
    align-self: center; padding: 6px 14px; margin: 0 4px;
    font: bold 15px Consolas, monospace; color: #d9a441;
    border-left: 1px solid rgba(107,74,34,.6); border-right: 1px solid rgba(107,74,34,.6);
    white-space: nowrap;
  }
  #pt-fbar { display: flex; height: 8px; background: #14100a; }
  #pt-pips { display: flex; justify-content: center; gap: 3px; padding: 4px 8px 6px; background: rgba(0,0,0,.18); }
  #sb-status { text-align: center; font: 11px Consolas, monospace; color: #d9a441; padding: 0 8px 5px; background: rgba(0,0,0,.18); }
  #sb-status:empty { display: none; }
  .pip { width: 9px; height: 9px; border-radius: 2px; background: #5a5244; }
  .pip.A { background: #5d8cf0; } .pip.B { background: #ef5d5d; }
  #pt-fa { background: linear-gradient(#5d8cf0,#3b63c4); transition: flex-grow .5s; }
  #pt-fb { background: linear-gradient(#ef5d5d,#c43b3b); transition: flex-grow .5s; }
  body.replay #banner, body.cinema #banner { top: 104px; }

  /* ===== REPLAYBAR: cockpit do replay ===== */
  #replaybar {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    z-index: 7; display: none; gap: 8px; align-items: center;
    background: linear-gradient(180deg, rgba(43,32,20,.94), rgba(30,21,9,.94));
    border: 2px solid #6b4a22; border-radius: 10px; padding: 8px 12px;
    box-shadow: 0 6px 24px rgba(0,0,0,.5); color: #f0e3c0;
    font: 13px 'Trebuchet MS', sans-serif;
  }
  body.replay #replaybar { display: flex; }
  #replaybar button {
    font: bold 13px 'Trebuchet MS', sans-serif; color: #f5e9c8; cursor: pointer;
    background: linear-gradient(#7a5226,#523414); border: 2px solid #2b1a0a;
    border-radius: 7px; padding: 5px 12px;
  }
  #replaybar button:hover { background: linear-gradient(#946530,#5f3c16); }
  #replaybar select {
    font: 13px 'Trebuchet MS', sans-serif; background: #2b1a0a; color: #f0e3c0;
    border: 1px solid #6b4a22; border-radius: 5px; padding: 3px;
  }
  #grepProg { font-family: Consolas, monospace; color: #d9a441; min-width: 92px; text-align: center; }
  #grepCam.ativo, #gcinema.ativo {
    border-color: #d9a441; box-shadow: 0 0 8px rgba(217,164,65,.6);
    background: linear-gradient(#946530,#5f3c16);
  }
  body.replay #gamebar { display: none; }  /* no replay, o cockpit e o replaybar */

  /* ===== MODO CINEMA: esconde o chrome de dev p/ gravar ===== */
  body.cinema #zoombar, body.cinema #sb-toggle { display: none; }
  body.cinema #gamebar { opacity: .12; transition: opacity .2s; }
  body.cinema #gamebar:hover { opacity: 1; }

  #zoombar { transition: right .25s ease; }
  body:not(.sb-closed) #zoombar { right: 316px; }
  #gamebar {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    pointer-events: auto; display: flex; align-items: center; gap: 8px;
    background: rgba(40,28,14,.82); border: 2px solid #6b4a22; border-radius: 8px;
    padding: 6px 10px; color: #f5e9c8; text-shadow: 1px 1px 2px #000; user-select: none;
  }
  .selrei { font: 12px 'Trebuchet MS', sans-serif; background: #2b1a0a; color: #f0e3c0;
    border: 1px solid #6b4a22; border-radius: 5px; padding: 2px; }
  #gamebar button {
    font: bold 14px "Trebuchet MS", sans-serif; color: #f5e9c8;
    background: linear-gradient(#7a5226,#523414); border: 2px solid #2b1a0a;
    border-radius: 6px; padding: 6px 12px; cursor: pointer; text-shadow: 1px 1px 2px #000;
  }
  #gamebar button:hover { background: linear-gradient(#946530,#5f3c16); }
  #gamebar button:active { transform: translateY(1px); }
  #gamebar label { font-size: 12px; display: flex; align-items: center; gap: 5px; }
  #zoombar button {
    width: 44px; height: 44px; font-size: 22px; font-weight: bold;
    color: #f5e9c8; background: linear-gradient(#7a5226,#523414);
    border: 2px solid #2b1a0a; border-radius: 8px; cursor: pointer;
    text-shadow: 1px 1px 2px #000;
  }
  #zoombar button:hover { background: linear-gradient(#946530,#5f3c16); }
  #zoombar button:active { transform: translateY(1px); }
</style>

<script src="world.js"></script>
<script src="engine.js"></script>
<script>
(() => {
  "use strict";

  // ---------- Mundo: FONTE UNICA em world.js ----------
  // O motor (engine.js) e o render leem exatamente a mesma geracao de terreno.
  const { hash, lerp, vnoise, lakeInfo, isWater, cellData, villageName,
          TRIBES, WORLD, LAKE_G, T_GRASS, T_FOREST, T_MOUNT, T_WATER } = World;

  // ---------- Configuração de render ----------
  const TILE = 32;          // pixels de mundo por coordenada
  const MIN_SCALE = 0.55;   // zoom máximo afastado (folga p/ ver todo o teatro)
  const MAX_SCALE = 4.0;    // zoom máximo aproximado (vilas detalhadas)

  // ---------- Canvas ----------
  const canvas = document.getElementById("map");
  const ctx = canvas.getContext("2d");
  let DPR = Math.min(window.devicePixelRatio || 1, 2);
  let VW = 0, VH = 0;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    VW = window.innerWidth; VH = window.innerHeight;
    canvas.width = Math.floor(VW * DPR);
    canvas.height = Math.floor(VH * DPR);
    canvas.style.width = VW + "px";
    canvas.style.height = VH + "px";
    draw();
  }
  window.addEventListener("resize", resize);

  // ---------- Câmera ----------
  // worldX -> screenX:  sx = wx * scale + panX
  let scale = 1.6;
  let panX = 0, panY = 0;

  // Começa centralizado em uma região movimentada do mundo
  function centerOn(cx, cy) {
    panX = VW / 2 - cx * TILE * scale;
    panY = VH / 2 - cy * TILE * scale;
  }

  // Prende a câmera às bordas do mundo: o mapa sempre preenche a tela toda
  function clampPan() {
    const cs = TILE * scale, wpx = WORLD * cs, wpy = WORLD * cs;
    panX = wpx >= VW ? Math.min(0, Math.max(VW - wpx, panX)) : (VW - wpx) / 2;
    panY = wpy >= VH ? Math.min(0, Math.max(VH - wpy, panY)) : (VH - wpy) / 2;
  }

  // (terreno, ruido, lagos, cellData, TRIBES, villageName e lerp agora vivem
  //  em world.js — desestruturados no topo. Nada de geracao de terreno aqui.)

  // ---------- Helpers de desenho ----------

  // Cor de grama com variação suave de larga escala (sem xadrez por célula)
  function grassColor(x, y) {
    const v = vnoise(x, y, 21, 0.07);          // manchas grandes e suaves
    const t = vnoise(x, y, 22, 0.30) * 0.30;   // textura leve
    const m = v * 0.78 + t;
    const g = Math.floor(lerp(126, 162, m));
    const rr = Math.floor(lerp(82, 110, m));
    return `rgb(${rr},${g},${Math.floor(g * 0.42)})`;
  }

  // Caminho de blob orgânico (arredondado/irregular) — caller define fillStyle e dá fill()
  function blobPath(cx, cy, r, seed) {
    const N = 16;
    const pts = [];
    for (let i = 0; i < N; i++) {
      const a = (i / N) * Math.PI * 2;
      const wob = 0.78 + hash(seed, i + 1, 88) * 0.34;
      pts.push([cx + Math.cos(a) * r * wob, cy + Math.sin(a) * r * wob]);
    }
    const mid = (p, q) => [(p[0] + q[0]) / 2, (p[1] + q[1]) / 2];
    ctx.beginPath();
    const m0 = mid(pts[N - 1], pts[0]);
    ctx.moveTo(m0[0], m0[1]);
    for (let i = 0; i < N; i++) {
      const cur = pts[i], nxt = pts[(i + 1) % N];
      const m = mid(cur, nxt);
      ctx.quadraticCurveTo(cur[0], cur[1], m[0], m[1]);
    }
    ctx.closePath();
  }

  // ---------- Tiles de terreno (árvore, pinheiro, montanha) ----------
  // Shapes/cores EXATAMENTE como fornecidos no SVG (viewBox 0..160), porém
  // desenhados direto no canvas — sem depender de carregamento de imagem.
  const VB = 160;            // espaço de coordenadas dos tiles
  const ANCHOR_X = 80;       // âncora de chão (onde o tile "toca" o solo)
  const ANCHOR_Y = 124;

  // helpers de primitiva (coords locais 0..160)
  function _circle(cx, cy, r, fill, a) {
    ctx.globalAlpha = a == null ? 1 : a;
    ctx.fillStyle = fill;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  function _ellipse(cx, cy, rx, ry, fill, a) {
    ctx.globalAlpha = a == null ? 1 : a;
    ctx.fillStyle = fill;
    ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  function _rect(x, y, w, h, fill) { ctx.fillStyle = fill; ctx.fillRect(x, y, w, h); }
  function _poly(pts, fill) {
    ctx.fillStyle = fill;
    ctx.beginPath(); ctx.moveTo(pts[0], pts[1]);
    for (let i = 2; i < pts.length; i += 2) ctx.lineTo(pts[i], pts[i + 1]);
    ctx.closePath(); ctx.fill();
  }

  const tileShapes = {
    arvore() {
      _ellipse(80, 120, 34, 10, "#4f7a30", 0.4);
      _rect(74, 92, 12, 32, "#6b4a2b");
      _circle(80, 78, 40, "#3f6b25");
      _circle(58, 86, 26, "#4a7d2c");
      _circle(102, 86, 26, "#4a7d2c");
      _circle(80, 62, 30, "#558a33");
      _circle(68, 74, 16, "#66a03d", 0.7);
    },
    pinheiro() {
      _ellipse(80, 124, 26, 9, "#4f7a30", 0.4);
      _rect(76, 96, 8, 30, "#5c4326");
      _poly([80, 40, 108, 98, 52, 98], "#2f5a22");
      _poly([80, 54, 102, 104, 58, 104], "#3a6b29");
      _poly([80, 68, 98, 110, 62, 110], "#467e31");
    },
    montanha() {
      _ellipse(80, 126, 50, 12, "#5a4d3a", 0.35);
      _poly([80, 46, 132, 124, 28, 124], "#8a7a63");
      _poly([80, 46, 106, 124, 54, 124], "#9c8c73");
      _poly([80, 46, 96, 80, 64, 80], "#e8e4dc");
      _poly([80, 46, 90, 72, 70, 72], "#ffffff");
      _poly([116, 108, 132, 124, 100, 124], "#73654f");
    },
  };

  // Desenha um tile com âncora de chão em (gx,gy), tamanho 'size' (px), rotação em rad
  function drawTile(type, gx, gy, size, rot) {
    const fn = tileShapes[type]; if (!fn) return;
    const k = size / VB;
    ctx.save();
    ctx.translate(gx, gy);
    if (rot) ctx.rotate(rot);
    ctx.scale(k, k);
    ctx.translate(-ANCHOR_X, -ANCHOR_Y); // (80,124) local -> (gx,gy) tela
    fn();
    ctx.restore();
  }

  // Casinha com telhado de duas águas
  function house(hx, hy, hw, hh, roof) {
    ctx.fillStyle = "#e8d6ac";                 // parede
    ctx.fillRect(hx - hw / 2, hy - hh, hw, hh);
    ctx.strokeStyle = "rgba(90,60,30,.5)"; ctx.lineWidth = Math.max(1, hw * 0.05);
    ctx.strokeRect(hx - hw / 2, hy - hh, hw, hh);
    ctx.fillStyle = roof;                      // telhado
    ctx.beginPath();
    ctx.moveTo(hx - hw * 0.62, hy - hh);
    ctx.lineTo(hx, hy - hh - hw * 0.55);
    ctx.lineTo(hx + hw * 0.62, hy - hh);
    ctx.closePath(); ctx.fill();
  }

  // Vilarejo fortificado detalhado em (px,py), tamanho s, cor da tribo
  function drawVillage(px, py, s, color) {
    // sombra
    ctx.fillStyle = "rgba(0,0,0,.20)";
    ctx.beginPath();
    ctx.ellipse(px, py + s * 0.78, s * 1.1, s * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();
    // montinho de terra
    ctx.fillStyle = "#caa86a";
    ctx.beginPath();
    ctx.ellipse(px, py + s * 0.62, s * 1.05, s * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#bb9858";
    ctx.beginPath();
    ctx.ellipse(px, py + s * 0.6, s * 0.82, s * 0.32, 0, 0, Math.PI * 2);
    ctx.fill();

    // muralha de pedra ao redor (anel)
    ctx.lineWidth = s * 0.18; ctx.strokeStyle = "#897f70";
    ctx.beginPath(); ctx.ellipse(px, py + s * 0.5, s * 0.9, s * 0.46, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.lineWidth = s * 0.07; ctx.strokeStyle = "#aaa193";
    ctx.beginPath(); ctx.ellipse(px, py + s * 0.5, s * 0.9, s * 0.46, 0, 0, Math.PI * 2); ctx.stroke();

    // casas internas
    const roofs = ["#9c3b2a", "#b5532f", "#7a3320", "#a8472b"];
    house(px - s * 0.46, py + s * 0.56, s * 0.42, s * 0.34, roofs[0]);
    house(px + s * 0.48, py + s * 0.52, s * 0.40, s * 0.30, roofs[1]);
    house(px - s * 0.02, py + s * 0.66, s * 0.36, s * 0.26, roofs[2]);

    // torre central (keep)
    ctx.fillStyle = "#cabfac";
    ctx.fillRect(px - s * 0.27, py - s * 0.55, s * 0.54, s * 0.95);
    ctx.fillStyle = "#b3a892";
    ctx.fillRect(px - s * 0.27, py - s * 0.66, s * 0.54, s * 0.13);
    // ameias
    ctx.fillStyle = "#938974";
    for (let i = 0; i < 3; i++)
      ctx.fillRect(px - s * 0.27 + i * s * 0.21, py - s * 0.78, s * 0.12, s * 0.13);
    // janelas
    ctx.fillStyle = "#5a4326";
    ctx.fillRect(px - s * 0.14, py - s * 0.35, s * 0.1, s * 0.16);
    ctx.fillRect(px + s * 0.04, py - s * 0.35, s * 0.1, s * 0.16);
    // portão
    ctx.fillStyle = "#5a3a1a";
    ctx.fillRect(px - s * 0.1, py + s * 0.06, s * 0.2, s * 0.34);

    // mastro + bandeira da tribo (grande, com contorno p/ destacar a cor do time)
    const poleTop = py - s * 1.9;
    ctx.strokeStyle = "#3a2a18"; ctx.lineWidth = Math.max(1.5, s * 0.07);
    ctx.beginPath(); ctx.moveTo(px, py - s * 0.85); ctx.lineTo(px, poleTop); ctx.stroke();
    // ponta dourada do mastro
    ctx.fillStyle = "#e8cf86";
    ctx.beginPath(); ctx.arc(px, poleTop, Math.max(1.5, s * 0.08), 0, Math.PI * 2); ctx.fill();

    // banner (galhardete) grande com recorte em "rabo de andorinha"
    const fw = s * 0.95, fh = s * 0.72;
    ctx.beginPath();
    ctx.moveTo(px, poleTop);
    ctx.lineTo(px + fw, poleTop);
    ctx.lineTo(px + fw * 0.72, poleTop + fh * 0.5);  // entalhe
    ctx.lineTo(px + fw, poleTop + fh);
    ctx.lineTo(px, poleTop + fh);
    ctx.closePath();
    ctx.fillStyle = color; ctx.fill();
    // faixa de brilho clara no topo (dá volume)
    ctx.fillStyle = "rgba(255,255,255,.28)";
    ctx.fillRect(px + s * 0.04, poleTop + fh * 0.1, fw * 0.6, fh * 0.18);
    // contorno escuro forte (visível contra qualquer terreno)
    ctx.lineWidth = Math.max(1, s * 0.06); ctx.strokeStyle = "rgba(20,12,4,.7)";
    ctx.beginPath();
    ctx.moveTo(px, poleTop);
    ctx.lineTo(px + fw, poleTop);
    ctx.lineTo(px + fw * 0.72, poleTop + fh * 0.5);
    ctx.lineTo(px + fw, poleTop + fh);
    ctx.lineTo(px, poleTop + fh);
    ctx.closePath(); ctx.stroke();
  }

  // ---------- Render principal ----------
  // ===== PINTURA DE TERRITORIO: area de influencia de cada rei =====
  // Cada aldeia com dono tinge os tiles ao redor (raio em tiles); o dono
  // mais proximo vence. Recalcula so quando o turno/posse muda.
  const RAIO_INF = 4;
  const infCache = { stamp: "", mapa: new Map() };
  function mapaInfluencia() {
    if (!game) return infCache.mapa;
    const stamp = game.turno + "|" + game.aldeias.map((a) => a.dono || "n").join("");
    if (stamp === infCache.stamp) return infCache.mapa;
    const m = new Map();
    for (const a of game.aldeias) {
      if (!a.dono) continue;
      for (let dy = -RAIO_INF; dy <= RAIO_INF; dy++) {
        for (let dx = -RAIO_INF; dx <= RAIO_INF; dx++) {
          const d2 = dx * dx + dy * dy;
          if (d2 > RAIO_INF * RAIO_INF) continue;
          const x = a.x + dx, y = a.y + dy;
          if (x < 0 || y < 0 || x >= WORLD || y >= WORLD || isWater(x, y)) continue;
          const k = x + "," + y;
          const atual = m.get(k);
          if (!atual || d2 < atual.d2) m.set(k, { dono: a.dono, d2 });
        }
      }
    }
    infCache.stamp = stamp; infCache.mapa = m;
    return m;
  }
  const COR_INF = { A: "70,110,220", B: "216,74,74" };
  const GLIFO = { lanceiro: "\uD83D\uDEE1", arqueiro: "\uD83C\uDFF9", cavaleiro: "\uD83D\uDC0E" }; // escudo/arco/cavalo

  function draw() {
    clampPan();
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ctx.clearRect(0, 0, VW, VH);

    // céu/fundo de água profunda
    ctx.fillStyle = "#6fa867";
    ctx.fillRect(0, 0, VW, VH);

    const cs = TILE * scale; // tamanho da célula na tela

    // região visível em coordenadas de mundo
    const x0 = Math.floor((-panX) / cs) - 1;
    const y0 = Math.floor((-panY) / cs) - 1;
    const x1 = Math.ceil((VW - panX) / cs) + 1;
    const y1 = Math.ceil((VH - panY) / cs) + 1;

    const cx0 = Math.max(0, x0), cy0 = Math.max(0, y0);
    const cx1 = Math.min(WORLD, x1), cy1 = Math.min(WORLD, y1);

    // Nível de detalhe (baseado no tamanho da célula em pixels)
    const detailed = cs > 20;    // desenha vilas e árvores
    const showNames = cs > 42;   // mostra nomes das vilas
    const gridView = cs < 13;    // visão de grade (mapa afastado)

    // 1) grama (variação suave; sem xadrez). Em zoom afastado usa blocos maiores.
    const gstep = cs < 18 ? 2 : 1;
    for (let y = cy0; y < cy1; y += gstep) {
      for (let x = cx0; x < cx1; x += gstep) {
        ctx.fillStyle = grassColor(x, y);
        ctx.fillRect(x * cs + panX, y * cs + panY, cs * gstep + 1, cs * gstep + 1);
      }
    }

    // 1b) lagos como blobs orgânicos arredondados
    const lg0x = Math.floor(cx0 / LAKE_G) - 1, lg1x = Math.floor(cx1 / LAKE_G) + 1;
    const lg0y = Math.floor(cy0 / LAKE_G) - 1, lg1y = Math.floor(cy1 / LAKE_G) + 1;
    for (let gx = lg0x; gx <= lg1x; gx++) {
      for (let gy = lg0y; gy <= lg1y; gy++) {
        const lk = lakeInfo(gx, gy);
        if (!lk) continue;
        const scx = lk.cx * cs + panX, scy = lk.cy * cs + panY, srad = lk.rad * cs;
        // margem clara (praia)
        blobPath(scx, scy, srad * 1.12, lk.seed);
        ctx.fillStyle = "#9fc18a"; ctx.fill();
        // água com profundidade (gradiente radial)
        const grad = ctx.createRadialGradient(scx, scy, srad * 0.1, scx, scy, srad);
        grad.addColorStop(0, "#3f7fb0"); grad.addColorStop(1, "#2f6694");
        blobPath(scx, scy, srad, lk.seed);
        ctx.fillStyle = grad; ctx.fill();
        // reflexo suave
        ctx.fillStyle = "rgba(255,255,255,.12)";
        blobPath(scx - srad * 0.2, scy - srad * 0.25, srad * 0.4, lk.seed + 7);
        ctx.fill();
      }
    }

    // 2) decoração de terreno (florestas e montanhas) — some só na visão de grade
    if (!gridView) {
      for (let y = cy0; y < cy1; y++) {
        for (let x = cx0; x < cx1; x++) {
          const d = cellData(x, y);
          const sx = x * cs + panX, sy = y * cs + panY;
          if (d.type === T_FOREST && !d.village) {
            if (detailed) {
              // mata: 1-2 árvores/pinheiros com variação natural de escala e rotação
              const n = 1 + Math.floor(hash(x, y, 31) * 2);
              for (let i = 0; i < n; i++) {
                const ox = 0.25 + hash(x, y, 40 + i) * 0.5;
                const oy = 0.55 + hash(x, y, 50 + i) * 0.35;
                const tipo = hash(x, y, 60 + i) < 0.45 ? "pinheiro" : "arvore";
                const sc = 0.85 + hash(x, y, 70 + i) * 0.30;        // 0.85..1.15
                const rot = tipo === "arvore" ? (hash(x, y, 80 + i) - 0.5) * 0.28 : 0; // ~ ±8°
                drawTile(tipo, sx + ox * cs, sy + oy * cs, cs * 1.25 * sc, rot);
              }
            } else {
              // zoom médio: mancha verde-escura arredondada
              ctx.fillStyle = "#2f6b2e";
              blobPath(sx + cs * 0.5, sy + cs * 0.5, cs * 0.5, (x & 1023) * 31 + (y & 1023));
              ctx.fill();
            }
          } else if (d.type === T_MOUNT) {
            if (detailed) {
              const sc = 0.9 + hash(x, y, 71) * 0.3;
              drawTile("montanha", sx + cs * 0.5, sy + cs * 0.72, cs * 1.6 * sc, 0);
            } else {
              // zoom médio: mancha acinzentada
              ctx.fillStyle = "#7d7163";
              blobPath(sx + cs * 0.5, sy + cs * 0.5, cs * 0.5, (x & 1023) * 17 + (y & 1023));
              ctx.fill();
            }
          }
        }
      }
    }

    // 3) vilas — SOMENTE as 50 aldeias da partida (cenário procedural escondido).
    //    A cor segue o DONO (azul A / vermelho B / tom neutro).
    for (let y = cy0; y < cy1; y++) {
      for (let x = cx0; x < cx1; x++) {
        const d = cellData(x, y);
        if (!d.village) continue;
        const gv = game ? game.byCell.get(x + "," + y) : null;
        if (game && !gv) continue;            // fora da partida: não desenha
        const sx = x * cs + panX, sy = y * cs + panY;
        const cor = gv ? (gv.dono === null ? COR.neutra : COR[gv.dono]) : TRIBES[d.tribe].c;

        if (gridView) {
          const r = Math.max(2, cs * 0.28);
          ctx.fillStyle = cor;
          ctx.fillRect(sx + cs / 2 - r, sy + cs / 2 - r, r * 2, r * 2);
          ctx.strokeStyle = "rgba(0,0,0,.5)"; ctx.lineWidth = 1;
          ctx.strokeRect(sx + cs / 2 - r, sy + cs / 2 - r, r * 2, r * 2);
        } else if (detailed) {
          drawVillage(sx + cs * 0.5, sy + cs * 0.48, cs * 0.34, cor);
          if (showNames && gv) {
            const fs = Math.max(9, cs * 0.13);
            ctx.font = `bold ${fs}px "Trebuchet MS", sans-serif`;
            ctx.textAlign = "center";
            const name = gv.nome;
            const tw = ctx.measureText(name).width;
            ctx.fillStyle = "rgba(30,20,10,.7)";
            ctx.fillRect(sx + cs * 0.5 - tw / 2 - 3, sy + cs * 0.78, tw + 6, fs + 4);
            ctx.fillStyle = "#ffe9b0";
            ctx.fillText(name, sx + cs * 0.5, sy + cs * 0.78 + fs);
          }
        } else {
          const r = cs * 0.22;
          ctx.fillStyle = "#b9a489";
          ctx.fillRect(sx + cs / 2 - r, sy + cs / 2 - r * 0.6, r * 2, r * 1.4);
          ctx.fillStyle = cor;
          ctx.fillRect(sx + cs / 2 - r, sy + cs / 2 - r * 0.6, r * 2, r * 0.4);
        }
      }
    }

    // 4) grade de coordenadas (aparece ao afastar)
    if (cs < 28) {
      const alpha = Math.min(1, (28 - cs) / 16);
      ctx.strokeStyle = `rgba(20,12,4,${0.35 * alpha})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let x = cx0; x <= cx1; x++) {
        const sx = Math.round(x * cs + panX) + 0.5;
        ctx.moveTo(sx, 0); ctx.lineTo(sx, VH);
      }
      for (let y = cy0; y <= cy1; y++) {
        const sy = Math.round(y * cs + panY) + 0.5;
        ctx.moveTo(0, sy); ctx.lineTo(VW, sy);
      }
      ctx.stroke();

      // rótulos de coordenadas (a cada N células para não poluir)
      const step = cs < 22 ? 5 : 1;
      ctx.fillStyle = `rgba(255,233,176,${0.9 * alpha})`;
      ctx.font = "10px Verdana";
      ctx.textAlign = "left";
      for (let x = cx0; x <= cx1; x++) {
        if (x % step !== 0) continue;
        ctx.fillText(x, x * cs + panX + 2, 12);
      }
      ctx.textAlign = "right";
      for (let y = cy0; y <= cy1; y++) {
        if (y % step !== 0) continue;
        ctx.fillText(y, VW - 4, y * cs + panY + 12);
      }
    }

    // FUNDO SILENCIADO: um veu neutro sobre o terreno abaixa o contraste
    // da decoracao (arvores/montanhas) p/ a camada de batalha dominar.
    if (game) {
      const cine = document.body.classList.contains("replay") ||
                   document.body.classList.contains("cinema");
      ctx.fillStyle = `rgba(28,22,12,${cine ? 0.16 : 0.10})`;
      ctx.fillRect(0, 0, VW, VH);
    }

    // ===== TERRITORIO: tingir a area de influencia dos reis =====
    if (game) {
      const inf = mapaInfluencia();
      for (const [k, v] of inf) {
        const [tx, ty] = k.split(",").map(Number);
        if (tx < cx0 || tx >= cx1 || ty < cy0 || ty >= cy1) continue;
        const perto = v.d2 <= 2;
        ctx.fillStyle = `rgba(${COR_INF[v.dono]},${perto ? 0.30 : 0.18})`;
        ctx.fillRect(tx * cs + panX, ty * cs + panY, cs + 1, cs + 1);
      }
    }

    // vinheta sutil: escurece as bordas, foca o teatro
    const vg = ctx.createRadialGradient(VW / 2, VH / 2, Math.min(VW, VH) * 0.50,
                                        VW / 2, VH / 2, Math.max(VW, VH) * 0.78);
    vg.addColorStop(0, "rgba(0,0,0,0)");
    vg.addColorStop(1, "rgba(18,11,4,.26)");
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, VW, VH);

    drawGame();   // camada do motor por cima do mapa
    updateHUD();
  }

  // ---------- HUD ----------
  let mouseSX = VW / 2, mouseSY = VH / 2;
  function updateHUD() {
    // caixas de coordenada/ajuda removidas: o mapa fala por si (espectador).
  }

  // ---------- Interação ----------
  let dragging = false, lastX = 0, lastY = 0, moved = 0;

  canvas.addEventListener("mousedown", (e) => {
    usuarioAssumiuCamera();
    dragging = true; moved = 0; lastX = e.clientX; lastY = e.clientY;
    canvas.classList.add("dragging");
  });
  window.addEventListener("mouseup", () => { dragging = false; canvas.classList.remove("dragging"); });
  window.addEventListener("mousemove", (e) => {
    mouseSX = e.clientX; mouseSY = e.clientY;
    if (dragging) {
      const dx = e.clientX - lastX, dy = e.clientY - lastY;
      panX += dx; panY += dy; lastX = e.clientX; lastY = e.clientY;
      moved += Math.abs(dx) + Math.abs(dy);
    }
    draw();
  });

  function zoomAt(sx, sy, factor) {
    const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * factor));
    // mantém o ponto sob o cursor fixo
    const wx = (sx - panX) / (TILE * scale);
    const wy = (sy - panY) / (TILE * scale);
    scale = newScale;
    panX = sx - wx * TILE * scale;
    panY = sy - wy * TILE * scale;
    draw();
  }

  canvas.addEventListener("wheel", (e) => {
    usuarioAssumiuCamera();
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    zoomAt(e.clientX, e.clientY, factor);
  }, { passive: false });

  document.getElementById("zin").addEventListener("click", () => zoomAt(VW / 2, VH / 2, 1.3));
  document.getElementById("zout").addEventListener("click", () => zoomAt(VW / 2, VH / 2, 1 / 1.3));

  // ============================================================
  //  CAMADA DO MOTOR (engine.js) — assistir a partida no mapa
  // ============================================================
  const COR = { A: "#3b6bd8", B: "#d83b3b", neutra: "#d9d2bd" };

  let game = null;        // estado da partida (engine)
  let playing = false;
  let speed = 500;        // ms por turno
  let timer = null;
  let runId = 0;          // token de geracao: invalida loops/respostas de runs antigos
  let replay = { frames: [] };   // gravacao da partida atual (p/ replay/YouTube)
  let emReplay = false;          // reproduzindo um replay carregado

  function gravarFrame() {
    if (emReplay || !game) return;
    replay.frames.push(JSON.parse(JSON.stringify({
      turno: game.turno,
      etiqueta: etiquetaB || "burro", // compat replays v1
      etiquetaA: etiquetaA || "burro",
      etiquetaB: etiquetaB || "burro",
      aldeias: game.aldeias,
      movimentos: game.movimentos,
      eventos: game.log.filter((e) => e.turno === game.turno),
    })));
  }
  // ===== REPRODUCAO: aplica um frame gravado ao estado visivel =====
  function aplicarFrame(fr) {
    game.turno = fr.turno;
    game.aldeias = fr.aldeias;
    game.movimentos = fr.movimentos;
    game.log = fr.eventos; // efeitos/cronica leem daqui
    etiquetaA = fr.etiquetaA || "burro";
    etiquetaB = fr.etiquetaB || fr.etiqueta || "?";

    // cronica em DIALETO DE ESPECTADOR: uma frase-icone por evento,
    // borda na cor de quem agiu. (O modo analista segue fora do replay.)
    const espPorLado = { A: [], B: [] };
    for (const e of fr.eventos) {
      if (e.tipo !== "combate" || !espPorLado[e.atacante]) continue;
      const gA = e.atkType ? GLIFO[e.atkType] : "";
      const gD = e.defType ? GLIFO[e.defType] : "";
      const selo = e.vantagem > 0 ? '<span class="bd certo">counter &#10003;</span>'
                 : e.vantagem < 0 ? '<span class="bd errado">counter &#10007;</span>' : "";
      const res = e.vencedor === "atacante"
        ? (e.conquista ? "&#9876; conquistada" : "vencida")
        : "&#128737; resistiu";
      espPorLado[e.atacante].push(`<div class="ev ev${e.atacante}">${gA} <b class="mono">${e.Fatk}</b>` +
        ` &#10142; ${esc(e.alvoNome)} ${gD} &mdash; ${res} ${selo}</div>`);
    }
    for (const lado of ["A", "B"]) {
      if (!espPorLado[lado].length) continue;
      addEntrada(feedDe(lado), `<div class="ent-t">Turno ${fr.turno} ` +
        `<span class="ent-m">${esc(lado === "A" ? etiquetaA : etiquetaB)}</span></div>` +
        espPorLado[lado].join("") + linhaPlacar());
    }

    // banners + escolha do alvo da camera
    let alvoCam = null;
    for (const e of fr.eventos) {
      if (e.tipo !== "combate") continue;
      if (!alvoCam) alvoCam = e;
      if (e.conquista) {
        const dono = e.atacante === "A" ? "Rei A" : "Rei B";
        mostrarBanner("\u2694 " + e.alvoNome + " caiu para o " + dono,
          e.atacante === "A" ? "#5d8cf0" : "#ef5d5d");
      } else if (e.vencedor === "defensor") {
        mostrarBanner("\ud83d\udee1 " + e.alvoNome + " resistiu ao ataque", "#b0a58a");
      }
    }
    if (alvoCam) {
      const a = game.aldeias.find((v) => v.id === alvoCam.alvoId);
      if (a) apontarCamera(a.x, a.y, 1.9);
    }

    registrarEfeitosTurno(fr.turno);
    updateGameHUD();
    const venc = Engine.checarVitoria(game);
    if (venc && venc !== "empate" && !REDUZ_MOV) {
      efeitos.push({ fim: true, t0: performance.now(), dur: 3500, cor: COR[venc] });
      ligarAnimacao();
    }
    if (venc) mostrarBanner("\ud83c\udfc6 " + (venc === "empate" ? "EMPATE" : "VIT\u00d3RIA DO REI " + venc), "#d9a441");
    draw();
  }

  let rep = null; // { dados, idx } quando em replay

  function atualizarProgresso() {
    if (!rep) return;
    document.getElementById("grepProg").textContent =
      "turno " + Math.min(rep.idx, rep.dados.frames.length) + "/" + rep.dados.frames.length;
    document.getElementById("grepPlay").innerHTML = playing ? "&#9208;" : "&#9654;";
  }

  async function runReplay(meuRun) {
    emReplay = true;
    document.body.classList.add("replay");
    camAuto = true;
    document.getElementById("grepCam").classList.add("ativo");
    limparFeeds();
    efeitos = [];
    limparBanners();
    apontarCamera(WORLD / 2, WORLD / 2, Math.max(MIN_SCALE, VW / (WORLD * TILE)));
    playing = true;
    while (emReplay && runId === meuRun) {
      atualizarProgresso();
      if (!playing || rep.idx >= rep.dados.frames.length) {
        if (rep.idx >= rep.dados.frames.length) playing = false; // fim: espera restart/sair
        await new Promise((r) => setTimeout(r, 140));
        continue;
      }
      aplicarFrame(rep.dados.frames[rep.idx++]);
      atualizarProgresso();
      const cadencia = parseInt(document.getElementById("grepVel").value, 10) || 2000;
      await new Promise((r) => setTimeout(r, cadencia));
    }
  }

  function sairReplay() {
    emReplay = false;
    playing = false;
    rep = null;
    limparBanners();
    document.body.classList.remove("replay");
    novaPartida();
  }

  function carregarReplay(file) {
    const rd = new FileReader();
    rd.onload = () => {
      try {
        const dados = JSON.parse(rd.result);
        if (!dados.frames || !dados.frames.length) throw new Error("replay vazio");
        pause();
        if (!game) game = Engine.criarEstadoInicial(Engine.CONFIG);
        rep = { dados, idx: 0 };
        const meuRun = ++runId;
        runReplay(meuRun);
      } catch (e) { alert("Replay invalido: " + e.message); }
    };
    rd.readAsText(file);
  }

  function baixarReplay() {
    if (!replay.frames.length) { alert("Nenhuma partida gravada ainda."); return; }
    const blob = new Blob([JSON.stringify({ v: 1, frames: replay.frames })],
      { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "replay_" + new Date().toISOString().slice(0, 16).replace(/[:T]/g, "-") + ".json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }

  // ===== CRONICA DA PARTIDA (barra lateral) =====
  const sbFeedB = document.getElementById("sb-feed");
  const sbFeedA = document.getElementById("sb-feedA");
  const feedDe = (lado) => (lado === "A" ? sbFeedA : sbFeedB);
  const limparFeeds = () => { sbFeedA.innerHTML = ""; sbFeedB.innerHTML = ""; };
  const REDUZ_MOV = window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches;
  const esc = (t) => String(t).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const chip = (cls, txt) => `<span class="bd ${cls}">${txt}</span>`;
  const setStatus = (t) => { document.getElementById("sb-status").textContent = t || ""; };

  // selo do matchup do triangulo (perspectiva do ATACANTE)
  function seloMatchup(atkT, defT) {
    if (!atkT || !defT) return "";
    const tri = game.config.triangulo;
    if (tri[atkT] === defT) return chip("certo", "counter certo");
    if (tri[defT] === atkT) return chip("errado", "counter errado");
    return chip("neutro", "neutro");
  }

  function addEntrada(feed, html) {
    const div = document.createElement("div");
    div.className = "ent";
    div.innerHTML = html;
    feed.appendChild(div);
    while (feed.children.length > 60) feed.removeChild(feed.firstChild);
    feed.scrollTop = feed.scrollHeight;
  }

  function linhaPlacar() {
    const f = (d) => Engine.aldeiasDe(game, d).reduce((s, a) => s + Engine.forcaDe(a.tropas, game.config), 0);
    return `<div class="plc">placar A ${Engine.aldeiasDe(game, "A").length} ald / ${f("A")} &middot; ` +
           `B ${Engine.aldeiasDe(game, "B").length} ald / ${f("B")}</div>`;
  }

  // ordens/rejeicoes de UM rei -> painel DELE
  function cronicaTurnoLado(lado, tn, diag) {
    const rotulo = lado === "A" ? etiquetaA : etiquetaB;
    const L = [`<div class="ent-t">Turno ${tn} <span class="ent-m">${esc(rotulo)}</span></div>`];
    if (diag) {
      for (const e of diag.aceitoEnvios) {
        const atkT = Engine.tipoDominante(game, e.tropas);
        const defT = e.alvo
          ? (e.alvo.dono === null ? e.alvo.tipo : Engine.tipoDominante(game, e.alvo.tropas))
          : null;
        L.push(`<div>&rarr; [${e.origemId}]&#8594;[${e.destinoId}] ` +
          `<span class="mono">${compStrG(e.tropas)}</span> ${seloMatchup(atkT, defT)}</div>`);
      }
      const cont = {};
      for (const c of diag.aceitoConstruir) cont[c.tipo] = (cont[c.tipo] || 0) + 1;
      const desc = Object.keys(cont).map((t) => `${cont[t]} ${t}`).join(", ");
      if (desc) L.push(`<div>&#9874; construir: ${desc}</div>`);
      if (!diag.aceitoEnvios.length && !desc) L.push(`<div style="color:#8f8468">passou o turno</div>`);
      for (const r of diag.rejeicoes) L.push(`<div class="rej">&#10007; ${esc(r)}</div>`);
    }
    addEntrada(feedDe(lado), L.join(""));
  }

  // combates/reforcos do turno -> painel de quem AGIU (atacante/dono)
  function cronicaEventos(tn) {
    const porLado = { A: [], B: [] };
    for (const e of game.log) {
      if (e.turno !== tn) continue;
      if (e.tipo === "combate" && (e.atacante === "A" || e.atacante === "B")) {
        const selo = e.vantagem > 0 ? chip("certo", "counter certo")
                   : e.vantagem < 0 ? chip("errado", "counter errado")
                   : chip("neutro", "neutro");
        const res = e.vencedor === "atacante"
          ? (e.conquista ? "CONQUISTOU" : "venceu")
          : "defesa segurou";
        porLado[e.atacante].push(`<div>&#9876; [${e.alvoId}] ${esc(e.alvoNome)} &mdash; ` +
          `<span class="mono">${e.FatkEf} vs ${e.FdefEf} ef</span> &rarr; ${res} ${selo}</div>`);
      } else if (e.tipo === "reforco" && porLado[e.dono]) {
        porLado[e.dono].push(`<div style="color:#8f8468">reforco em [${e.alvoId}] ${esc(e.alvoNome)}: ` +
          `<span class="mono">${compStrG(e.tropas)}</span></div>`);
      }
    }
    for (const lado of ["A", "B"]) {
      if (!porLado[lado].length) continue;
      addEntrada(feedDe(lado),
        `<div class="ent-t">Turno ${tn}</div>` + porLado[lado].join("") + linhaPlacar());
    }
  }

  // reforcos do turno agrupados por aldeia: 1 linha em vez de N gotas

  // turno burro-vs-burro: so registra quando ha combate (evita inundar o feed)

  // ===== EFEITOS DE MAPA (anel de impacto / pulso de conquista) =====
  let efeitos = [];
  let efeitoLoop = false;
  const EFEITO_DUR = 900; // ms

  function registrarEfeitosTurno(tn) {
    if (REDUZ_MOV) return;
    for (const e of game.log) {
      if (e.turno !== tn || e.tipo !== "combate") continue;
      const a = game.aldeias.find((v) => v.id === e.alvoId);
      if (!a) continue;
      efeitos.push({
        x: a.x, y: a.y, t0: performance.now(), conq: !!e.conquista,
        cor: e.conquista ? (COR[a.dono] || COR.neutra) : "#ffd56b",
      });
      if (e.baixasForca > 0) { // dano do vencedor: flutua sobre a aldeia
        const corD = e.vencedor === "atacante" ? COR[e.atacante] : "#f0e3c0";
        efeitos.push({ x: a.x, y: a.y, t0: performance.now(), dur: 1400,
          dano: "-" + e.baixasForca, cor: corD });
      }
    }
    if (efeitos.length && !efeitoLoop) { efeitoLoop = true; requestAnimationFrame(tickEfeitos); }
  }
  // ===== CAMERA CINEMATOGRAFICA (so no replay) =====
  let camAlvo = null;    // { panX, panY, scale }
  let camAuto = true;    // no replay: false = usuario assumiu a camera
  function usuarioAssumiuCamera() {
    if (!emReplay || !camAuto) return;
    camAuto = false; camAlvo = null;
    const b = document.getElementById("grepCam");
    if (b) b.classList.remove("ativo");
  }
  function apontarCamera(cx, cy, alvoScale) {
    if (emReplay && !camAuto) return; // usuario esta no comando
    if (REDUZ_MOV) { scale = alvoScale; centerOn(cx, cy); draw(); return; }
    const sNovo = Math.max(MIN_SCALE, Math.min(MAX_SCALE, alvoScale));
    camAlvo = {
      scale: sNovo,
      panX: VW / 2 - (cx + 0.5) * TILE * sNovo,
      panY: VH / 2 - (cy + 0.5) * TILE * sNovo,
    };
    ligarAnimacao();
  }
  function passoCamera() {
    if (!camAlvo) return false;
    const f = 0.10; // suavizacao
    scale += (camAlvo.scale - scale) * f;
    panX += (camAlvo.panX - panX) * f;
    panY += (camAlvo.panY - panY) * f;
    const perto = Math.abs(camAlvo.scale - scale) < 0.002 &&
      Math.abs(camAlvo.panX - panX) < 0.6 && Math.abs(camAlvo.panY - panY) < 0.6;
    if (perto) { scale = camAlvo.scale; panX = camAlvo.panX; panY = camAlvo.panY; camAlvo = null; }
    return true;
  }

  function tickEfeitos() {
    const camAtiva = passoCamera();
    if (!efeitos.length && !camAtiva) { efeitoLoop = false; return; }
    draw();
    requestAnimationFrame(tickEfeitos);
  }
  function ligarAnimacao() {
    if (!efeitoLoop) { efeitoLoop = true; requestAnimationFrame(tickEfeitos); }
  }

  // ===== BANNERS DE EVENTO (fila; um de cada vez) =====
  const filaBanner = [];
  let bannerAtivo = false;
  function mostrarBanner(txt, cor, prioridade) {
    // fila curta: banner atrasado e banner errado. Sem prioridade, cai
    // primeiro quando a fila enche; com fila cheia, o mais velho sai.
    if (filaBanner.length >= 3) {
      const i = filaBanner.findIndex((b) => !b.prioridade);
      filaBanner.splice(i >= 0 ? i : 0, 1);
    }
    filaBanner.push({ txt, cor, prioridade: !!prioridade });
    if (!bannerAtivo) proximoBanner();
  }
  function limparBanners() {
    filaBanner.length = 0;
    document.getElementById("banner").classList.remove("show");
    bannerAtivo = false;
  }
  function proximoBanner() {
    const b = filaBanner.shift();
    if (!b) { bannerAtivo = false; return; }
    bannerAtivo = true;
    const el = document.getElementById("banner");
    el.textContent = b.txt;
    el.style.borderColor = b.cor || "#d9a441";
    el.classList.add("show");
    const dur = REDUZ_MOV ? 2600 : (filaBanner.length ? 1100 : 1900); // fila cheia = mais rapido
    setTimeout(() => {
      el.classList.remove("show");
      setTimeout(proximoBanner, 250);
    }, dur);
  }


  // enquadra a camera no teatro da partida
  function enquadrarTeatro() {
    const t = Engine.CONFIG.teatro;
    const fit = Math.min(VW / (t.w * TILE), VH / (t.h * TILE));
    scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, fit * 0.96));
    centerOn(t.x0 + t.w / 2, t.y0 + t.h / 2);
  }

  function novaPartida() {
    pause();
    limparFeeds();
    efeitos = [];
    emReplay = false;
    rep = null;
    replay = { frames: [] };
    document.body.classList.remove("cinema");
    document.body.classList.remove("replay");
    etiquetaA = document.getElementById("gmodA").value;
    etiquetaB = document.getElementById("gmodB").value;
    contadores = { A: cont0(), B: cont0() }; // metricas por partida
    geminiLog = []; // log zera AQUI (ponto unico, junto dos contadores) — nunca no Play/resume
    game = Engine.criarEstadoInicial(Engine.CONFIG);
    // indice celula -> aldeia (posicoes fixas): filtro rapido no render
    game.byCell = new Map(game.aldeias.map((a) => [a.x + "," + a.y, a]));
    enquadrarTeatro();
    updateGameHUD();
    draw();
  }

  function passoTurno() {
    if (!game || Engine.checarVitoria(game)) { pause(); return; }
    Engine.rodarTurno(game, null);
    registrarEfeitosTurno(game.turno);
    cronicaEventos(game.turno);
    gravarFrame();
    updateGameHUD();
    draw();
    if (Engine.checarVitoria(game)) pause();
  }

  // ----- MODO GEMINI: Rei B decidido pela API, ao vivo no mapa -----
  // Mesma interface logica do rei.js (Node): tick -> A(burro) -> B(gemini) ->
  // draw. A chave NAO e hardcoded: o usuario cola uma vez (fica so no browser).
  const GEMINI_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent";
  const MIN_INTERVALO_G = 13000; // free tier ~5 req/min -> piso de 13s entre chamadas
  let geminiKey = "";
  let ultimoEnvioG = 0;
  let geminiLog = [];      // buffer textual da partida (p/ baixar e avaliar depois)
  // METRICA NOVA (handoff 03/07): ENVIOS/TURNO (agencia) separada de
  // validade — o llama3 8B teve validade perfeita e agencia ZERO. Contado
  // por rei, zera em novaPartida, vira bloco RESUMO no fim do .txt.
  const cont0 = () => ({ turnos: 0, valido: 0, enviosAceitos: 0, constrAceitas: 0, rejeicoes: 0, normalizacoes: 0 });
  let contadores = { A: cont0(), B: cont0() };
  let etiquetaB = "gemini"; // rotulo do decisor do Rei B no log (gemini | ollama:<modelo>)
  function lsGet(k) { try { return localStorage.getItem(k); } catch (_) { return null; } }
  function lsSet(k, v) { try { localStorage.setItem(k, v); } catch (_) {} }
  geminiKey = lsGet("GEMINI_API_KEY") || "";

  function pedirChave() {
    if (!geminiKey) {
      const k = (window.prompt("Cole sua GEMINI_API_KEY (fica so neste navegador):") || "").trim();
      if (k) { geminiKey = k; lsSet("GEMINI_API_KEY", k); }
    }
    return geminiKey;
  }
  const espera = (ms) => new Promise((r) => setTimeout(r, ms));

  async function gerarGemini(prompt) {
    const faltam = MIN_INTERVALO_G - (Date.now() - ultimoEnvioG);
    if (faltam > 0) await espera(faltam); // pacing p/ caber no free tier
    ultimoEnvioG = Date.now();
    for (let tentativa = 1; ; tentativa++) {
      const resp = await fetch(GEMINI_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-goog-api-key": geminiKey },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: tempLLM } }),
      });
      if (resp.ok) {
        const data = await resp.json();
        const c = data.candidates && data.candidates[0];
        const parts = c && c.content && c.content.parts;
        return (parts || []).map((p) => p.text || "").join("");
      }
      const corpo = await resp.text().catch(() => "");
      if ((resp.status !== 429 && resp.status !== 503) || tentativa >= 6) throw new Error("Gemini HTTP " + resp.status + ": " + corpo);
      const m = /"retryDelay"\s*:\s*"(\d+(?:\.\d+)?)s"/.exec(corpo);
      const ms = m ? Math.ceil(parseFloat(m[1]) * 1000) : Math.min(1000 * 2 ** tentativa, 40000);
      await espera(ms + 500); // backoff SO p/ throttle de transporte (429/503)
    }
  }

  // composicao curta p/ o log (ex.: "10L+5C")
  function compStrG(t) {
    const p = [];
    if (t.lanceiro) p.push(t.lanceiro + "L");
    if (t.arqueiro) p.push(t.arqueiro + "A");
    if (t.cavaleiro) p.push(t.cavaleiro + "C");
    return p.join("+") || "0";
  }

  // registra UM turno no buffer: resposta crua + ordem + aceito/rejeitado +
  // combates do turno + placar. Esse buffer vira o .txt do eval.
  function registrarTurnoLado(lado, rotulo, r) {
    const ct = contadores[lado];
    ct.turnos++;
    if (r.ok) ct.valido++;
    ct.normalizacoes += (r.normalizacoes || []).length;
    if (r.diag) {
      ct.enviosAceitos += r.diag.aceitoEnvios.length;
      ct.constrAceitas += r.diag.aceitoConstruir.length;
      ct.rejeicoes += r.diag.rejeicoes.length;
    }
    const L = [];
    L.push("########## TURNO " + game.turno + " \u2014 Rei " + lado + " (" + rotulo + ") ##########");
    L.push("resposta crua: " + JSON.stringify(r.cru));
    L.push("ordem.construir: " + JSON.stringify(r.ordem.construir || []));
    L.push("ordem.envios   : " + JSON.stringify(r.ordem.envios || []));
    // H3: a normalizacao NAO esconde o desvio — cada correcao vira linha no
    // txt, p/ o eval contar "quantas vezes o modelo errou a grafia" separado
    // de "quantas ordens valeram".
    (r.normalizacoes || []).forEach((n) => L.push("NORMALIZADO: " + n));
    const diag = r.diag;
    if (diag) {
      if (!diag.aceitoConstruir.length && !diag.aceitoEnvios.length) L.push("ACEITO: (nada \u2014 passou o turno)");
      diag.aceitoConstruir.forEach((c) => L.push("ACEITO construir " + c.tipo + " em [" + c.aldeiaId + "]"));
      diag.aceitoEnvios.forEach((e) => L.push("ACEITO envio [" + e.origemId + "]->[" + e.destinoId + "]: " + compStrG(e.tropas) +
        (e.alvo && e.alvo.dono === null ? " (alvo neutra " + e.alvo.tipo + ")" : "")));
      diag.rejeicoes.forEach((m) => L.push("REJEITADO: " + m));
    }
    geminiLog.push(L.join("\n"));
  }

  // eventos do turno (combates/reforcos) + placar: UMA vez por turno no .txt
  function registrarEventosTurno() {
    const tn = game.turno, L = [];
    game.log.filter((x) => x.turno === tn).forEach((e) => {
      if (e.tipo === "combate")
        L.push("COMBATE [" + e.alvoId + "] " + e.alvoNome + ": atacante " + e.atacante +
          " Fatk=" + e.Fatk + " (ef " + e.FatkEf + ") Fdef=" + e.Fdef + " (ef " + e.FdefEf + ") vant=" + e.vantagem + " -> vence " + e.vencedor +
          (e.conquista ? " (CONQUISTA)" : "") + " | baixas~" + e.baixasForca);
      else if (e.tipo === "reforco")
        L.push("REFORCO [" + e.alvoId + "] " + e.alvoNome + " dono " + e.dono + ": " + compStrG(e.tropas));
    });
    const f = (d) => Engine.aldeiasDe(game, d).reduce((s2, a) => s2 + Engine.forcaDe(a.tropas, game.config), 0);
    L.push("placar: A " + Engine.aldeiasDe(game, "A").length + " ald/forca " + f("A") +
      " | B " + Engine.aldeiasDe(game, "B").length + " ald/forca " + f("B") +
      " | neutras " + Engine.aldeiasDe(game, null).length + " | transito " + game.movimentos.length);
    L.push("");
    geminiLog.push(L.join("\n"));
  }

  // baixa o buffer como .txt simples (vai p/ a pasta Downloads do navegador)
  function baixarLogGemini() {
    if (!geminiLog.length) { alert("Sem log ainda — rode o Gemini primeiro."); return; }
    // RESUMO por rei no rabo do .txt (calculado no download, nao polui o buffer)
    const resumo = ["", "================== RESUMO =================="];
    for (const lado of ["A", "B"]) {
      const c = contadores[lado], rot = lado === "A" ? etiquetaA : etiquetaB;
      if (!c.turnos) continue;
      const ag = (c.enviosAceitos / c.turnos).toFixed(2);
      resumo.push("Rei " + lado + " (" + rot + "): " + c.turnos + " turnos | " +
        "AGENCIA " + ag + " envios/turno (" + c.enviosAceitos + " envios, " + c.constrAceitas + " constr) | " +
        "validade " + c.valido + "/" + c.turnos + " | rejeicoes " + c.rejeicoes +
        " | normalizacoes " + c.normalizacoes);
    }
    resumo.push("============================================");
    const blob = new Blob([geminiLog.concat(resumo).join("\n")], { type: "text/plain;charset=utf-8" });
    const a = document.createElement("a");
    const ts = new Date().toISOString().replace(/[:T]/g, "-").slice(0, 16);
    a.href = URL.createObjectURL(blob);
    const nomeAB = (etiquetaA + "_vs_" + etiquetaB).replace(/[^a-z0-9._]/gi, "-");
    a.download = "partida_" + nomeAB + "_" + ts + ".txt";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }

  // ----- TEMPERATURA (H1): knob via URL — abrir index.html?temp=0.7.
  // Default 0 (benchmark de sempre). Sem UI nova de proposito: cirurgia de
  // HTML foi onde a sessao de 03/07 sangrou. Vale p/ Ollama E Gemini.
  let tempLLM = 0;
  try {
    const q = new URLSearchParams((window.location && window.location.search) || "");
    if (q.has("temp")) { const v = parseFloat(q.get("temp")); if (isFinite(v) && v >= 0) tempLLM = v; }
  } catch (e) {}

  // ----- OLLAMA: geracao local (localhost:11434), sem chave e sem pacing.
  // A pagina abre via file:// (origin "null") e o Ollama bloqueia por CORS
  // por padrao -> precisa de OLLAMA_ORIGINS=* (o alerta do runDuelo instrui).
  const OLLAMA_URL = "http://localhost:11434/api/generate";
  async function gerarOllama(prompt, modelo) {
    const resp = await fetch(OLLAMA_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: modelo, prompt, stream: false, options: { temperature: tempLLM } }),
    });
    if (!resp.ok) throw new Error("Ollama HTTP " + resp.status);
    const data = await resp.json();
    return data.response || "";
  }

  // ===== DUELO: qualquer combinacao de reis (burro / gemini / ollama) =====
  let etiquetaA = "burro";

  function fabricarGerador(valor) {
    if (valor === "burro") return null; // burro decide sem rede
    if (valor === "gemini") return (p) => gerarGemini(p);
    const modelo = valor.slice("ollama:".length);
    return (p) => gerarOllama(p, modelo);
  }

  // Decide e executa a ordem de UM lado. Retorna "abort" se o run mudou.
  async function decidirLado(lado, gerador, rotulo, meuRun) {
    if (!Engine.aldeiasDe(game, lado).length) return null;
    if (!gerador) {
      Engine.executarOrdem(game, lado, Engine.jogadorBurro(Engine.montarVisao(game, lado)));
      return null;
    }
    const prompt = Engine.montarPrompt(Engine.montarVisao(game, lado));
    setStatus("Rei " + lado + " pensando... (" + rotulo + ")");
    let cru = "";
    try { cru = await gerador(prompt); }
    catch (e) { cru = "[ERRO DE REDE] " + e.message; }
    setStatus("");
    if (runId !== meuRun) return "abort"; // resposta atrasada de run antigo
    const p = Engine.parsearOrdem(cru);                       // sem retry (benchmark)
    const ordem = p.ordem;
    const diag = Engine.diagnosticarOrdem(game, lado, ordem); // ANTES de executar
    Engine.executarOrdem(game, lado, ordem);
    return { cru, ordem, diag, ok: p.ok, normalizacoes: p.normalizacoes || [] }; // H3: p/ o txt
  }

  async function passoTurnoDuelo(meuRun) {
    if (meuRun === undefined) meuRun = ++runId;
    const vA = document.getElementById("gmodA").value, vB = document.getElementById("gmodB").value;
    etiquetaA = vA; etiquetaB = vB;
    Engine.tick(game);
    const rA = await decidirLado("A", fabricarGerador(vA), vA, meuRun);
    if (rA === "abort") return;
    const rB = await decidirLado("B", fabricarGerador(vB), vB, meuRun);
    if (rB === "abort") return;
    if (rA) registrarTurnoLado("A", vA, rA);
    if (rB) registrarTurnoLado("B", vB, rB);
    if (rA || rB) registrarEventosTurno();
    registrarEfeitosTurno(game.turno);
    if (rA) cronicaTurnoLado("A", game.turno, rA.diag);
    if (rB) cronicaTurnoLado("B", game.turno, rB.diag);
    cronicaEventos(game.turno);
    gravarFrame();
    updateGameHUD();
    draw();
  }

  async function runDuelo(meuRun) {
    const vA = document.getElementById("gmodA").value, vB = document.getElementById("gmodB").value;
    if ((vA === "gemini" || vB === "gemini") && !pedirChave()) {
      pause(); alert("Sem GEMINI_API_KEY: nao da pra rodar o Gemini."); return;
    }
    const usaOllama = [vA, vB].find((v) => v.startsWith("ollama:"));
    if (usaOllama) { // sanity check (e teste de CORS)
      const modelo = usaOllama.slice("ollama:".length);
      setStatus("testando conexao com o Ollama...");
      try { await gerarOllama("responda apenas: ok", modelo); setStatus(""); }
      catch (e) {
        setStatus(""); pause();
        alert("Nao consegui falar com o Ollama (" + e.message + ").\n\n" +
          "Provavel CORS: a pagina abre via file:// e o Ollama bloqueia por padrao.\n" +
          "Feche o Ollama (icone da bandeja) e rode no PowerShell:\n\n" +
          "    $env:OLLAMA_ORIGINS=\"*\"; ollama serve\n\n" +
          "Deixe essa janela aberta e tente o Play de novo.\n" +
          "Confira tambem que o modelo existe:  ollama pull " + modelo);
        return;
      }
    }
    const maxT = Math.max(1, parseInt(document.getElementById("gmax").value, 10) || 6);
    // BUG de 04/07: zerar o log AQUI apagava os turnos anteriores a cada
    // resume (Play depois de pausa), dessincronizando log e contadores.
    // Agora o reset vive em novaPartida; o Play so abre o cabecalho se a
    // partida esta comecando (log vazio).
    if (!geminiLog.length) {
      geminiLog.push("=== PARTIDA Rei A (" + vA + ") vs Rei B (" + vB + ") | seed " + game.config.seed +
        " | maxTurnos " + maxT + " | " + new Date().toLocaleString() + " ===\n");
    }
    while (playing && runId === meuRun && game && !Engine.checarVitoria(game) && game.turno < maxT) {
      await passoTurnoDuelo(meuRun);
    }
    if (runId !== meuRun) return; // run antigo: nao fecha nem baixa o log do run novo
    pause();
    updateGameHUD();
    const venc = Engine.checarVitoria(game);
    geminiLog.push("=== FIM === turno " + game.turno + " | resultado: " +
      (venc ? "vitoria " + venc : "limite de turnos") +
      " | A " + Engine.aldeiasDe(game, "A").length + " ald | B " + Engine.aldeiasDe(game, "B").length +
      " ald | neutras " + Engine.aldeiasDe(game, null).length);
    baixarLogGemini(); // baixa o .txt automaticamente no fim da partida
  }

  function play() {
    if (emReplay) return; // no replay, os controles sao os do replaybar
    if (playing || !game || Engine.checarVitoria(game)) return;
    playing = true;
    const meuRun = ++runId; // este Play e o unico dono da partida a partir daqui
    document.getElementById("gplay").textContent = "⏸ Pausar";
    const vA = document.getElementById("gmodA").value, vB = document.getElementById("gmodB").value;
    if (vA !== "burro" || vB !== "burro") { runDuelo(meuRun); return; } // modelos gateiam a cadencia
    timer = setInterval(passoTurno, speed);
  }
  function pause() {
    playing = false;
    if (timer) { clearInterval(timer); timer = null; }
    const b = document.getElementById("gplay");
    if (b) b.textContent = "▶ Play";
  }

  // torreao de pedra com bandeira do dono (aldeias de rei)
  function desenharTorreao(sx, sy, r, col) {
    const w = r * 1.05, h = r * 0.80, x = sx - w / 2, y = sy - h * 0.28;
    ctx.lineWidth = Math.max(1, r * 0.07); ctx.strokeStyle = "rgba(20,12,4,.85)";
    ctx.fillStyle = "#6e5c46";                       // corpo de pedra
    ctx.fillRect(x, y, w, h); ctx.strokeRect(x, y, w, h);
    ctx.fillStyle = "#7d6a51";                       // ameias
    const d = w / 5;
    for (let i = 0; i < 3; i++) ctx.fillRect(x + d * (2 * i) * 0.85 + d * 0.15, y - h * 0.22, d, h * 0.22);
    ctx.fillStyle = "#241a10";                       // porta
    ctx.beginPath(); ctx.arc(sx, y + h, r * 0.18, Math.PI, 0); ctx.fill();
    ctx.strokeStyle = "#3a2c1c"; ctx.lineWidth = Math.max(1, r * 0.08); // mastro
    ctx.beginPath(); ctx.moveTo(sx, y - h * 0.20); ctx.lineTo(sx, y - h * 0.78); ctx.stroke();
    ctx.fillStyle = col;                             // bandeira do rei
    ctx.beginPath();
    ctx.moveTo(sx, y - h * 0.78); ctx.lineTo(sx + r * 0.52, y - h * 0.62); ctx.lineTo(sx, y - h * 0.46);
    ctx.closePath(); ctx.fill();
    ctx.lineWidth = 1; ctx.strokeStyle = "rgba(20,12,4,.6)"; ctx.stroke();
  }

  // cabana com telhado de palha (aldeias neutras)
  function desenharCabana(sx, sy, r) {
    const w = r * 0.95, h = r * 0.55, x = sx - w / 2, y = sy - h * 0.1;
    ctx.lineWidth = Math.max(1, r * 0.07); ctx.strokeStyle = "rgba(20,12,4,.8)";
    ctx.fillStyle = "#7a6248";
    ctx.fillRect(x, y, w, h); ctx.strokeRect(x, y, w, h);
    ctx.fillStyle = "#9a7d45";                       // telhado
    ctx.beginPath();
    ctx.moveTo(x - w * 0.12, y); ctx.lineTo(sx, y - h * 0.85); ctx.lineTo(x + w * 1.12, y);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#241a10";                       // porta
    ctx.fillRect(sx - r * 0.10, y + h * 0.35, r * 0.20, h * 0.65);
  }

  // desenha aldeias do jogo (cor do dono) + exercitos em transito
  function drawGame() {
    if (!game) return;
    const cs = TILE * scale;

    for (const a of game.aldeias) {
      const sx = a.x * cs + panX + cs / 2, sy = a.y * cs + panY + cs / 2;
      if (sx < -60 || sy < -60 || sx > VW + 60 || sy > VH + 60) continue;
      const col = a.dono === null ? COR.neutra : COR[a.dono];
      const r = Math.max(5, cs * 0.40);

      // tintura sutil da cor do dono (le-se o territorio de relance)
      ctx.globalAlpha = a.dono === null ? 0.10 : 0.18;
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;

      ctx.lineWidth = 1; ctx.strokeStyle = "rgba(0,0,0,.55)";
      ctx.beginPath(); ctx.arc(sx, sy, r + 2, 0, Math.PI * 2); ctx.stroke();
      ctx.lineWidth = Math.max(2.5, cs * 0.11); ctx.strokeStyle = col;
      ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.stroke();

      if (cs > 20) {
        const LET = { lanceiro: "L", arqueiro: "A", cavaleiro: "C" };
        const val = a.dono === null
          ? (a.tropas[a.tipo] || 0) + LET[a.tipo]      // neutra: "40L" (tipo único)
          : Engine.forcaDe(a.tropas, game.config);     // rei: força total

        const fs = Math.max(10, cs * 0.32);
        ctx.font = `bold ${fs}px Verdana`; ctx.textAlign = "center";
        ctx.lineWidth = Math.max(2, fs * 0.28); ctx.strokeStyle = "rgba(20,12,4,.85)";
        ctx.strokeText(val, sx, sy - r - 3);
        ctx.fillStyle = a.dono === null ? "#fff" : col === COR.A ? "#bcd0ff" : "#ffc4c4";
        ctx.fillText(val, sx, sy - r - 3);

        // predio no centro (torreao com bandeira / cabana) + selo do tipo
        // na borda: o matchup segue legivel sem esconder a construcao
        const tg = a.dono === null ? a.tipo : Engine.tipoDominante(game, a.tropas);
        if (cs >= 26) {
          if (a.dono === null) desenharCabana(sx, sy, r);
          else desenharTorreao(sx, sy, r, col);
          if (tg) {
            const rb = Math.max(6, r * 0.34);
            ctx.fillStyle = "rgba(24,17,8,.92)";
            ctx.beginPath(); ctx.arc(sx + r * 0.68, sy + r * 0.68, rb, 0, Math.PI * 2); ctx.fill();
            ctx.lineWidth = 1; ctx.strokeStyle = "rgba(217,164,65,.55)"; ctx.stroke();
            ctx.font = `${rb * 1.35}px serif`;
            ctx.fillText(GLIFO[tg], sx + r * 0.68, sy + r * 0.68 + rb * 0.48);
          }
        } else if (tg) {
          const fg = Math.max(9, cs * 0.30);
          ctx.font = `bold ${fg}px Verdana`;
          ctx.lineWidth = Math.max(2, fg * 0.25); ctx.strokeStyle = "rgba(20,12,4,.9)";
          ctx.strokeText(LET[tg], sx, sy + fg * 0.36);
          ctx.fillStyle = "#f5e9c8";
          ctx.fillText(LET[tg], sx, sy + fg * 0.36);
        }
      }
    }

    for (const m of game.movimentos) {
      const o = game.aldeias.find((a) => a.id === m.origemId);
      const d = game.aldeias.find((a) => a.id === m.destinoId);
      if (!o || !d) continue;
      const prog = m.turnosTotal ? (m.turnosTotal - m.turnosRestantes) / m.turnosTotal : 1;
      const mx = lerp(o.x, d.x, prog) * cs + panX + cs / 2;
      const my = lerp(o.y, d.y, prog) * cs + panY + cs / 2;
      const dx = d.x * cs + panX + cs / 2, dy = d.y * cs + panY + cs / 2;
      const col = COR[m.dono];

      // fio fino ate o destino (intencao) + RASTRO esmaecente atras (movimento)
      ctx.lineWidth = 1; ctx.strokeStyle = "rgba(0,0,0,.15)";
      ctx.beginPath(); ctx.moveTo(mx, my); ctx.lineTo(dx, dy); ctx.stroke();
      const ox = o.x * cs + panX + cs / 2, oy = o.y * cs + panY + cs / 2;
      const angT = Math.atan2(my - oy, mx - ox);
      const compR = Math.min(Math.hypot(mx - ox, my - oy), cs * 2.0);
      const tx = mx - Math.cos(angT) * compR, ty = my - Math.sin(angT) * compR;
      const gradR = ctx.createLinearGradient(tx, ty, mx, my);
      const rgbR = m.dono === "A" ? "93,140,240" : "239,93,93";
      gradR.addColorStop(0, `rgba(${rgbR},0)`);
      gradR.addColorStop(1, `rgba(${rgbR},.55)`);
      ctx.lineWidth = Math.max(2, cs * 0.10); ctx.lineCap = "round";
      ctx.strokeStyle = gradR;
      ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(mx, my); ctx.stroke();
      ctx.lineCap = "butt";

      // PREVISAO DE CONFRONTO: a 1 turno de chegar, halo no alvo diz o
      // desfecho (verde vence / vermelho perde / ambar parelho). Usa a
      // MESMA conta do motor (Engine.preverCombate) — nunca diverge.
      if (m.turnosRestantes === 1 && d.dono !== m.dono && cs > 13) {
        const pv = Engine.preverCombate(game, m.tropas, d);
        const folga = 1.2;
        const corH = pv.atacanteVence
          ? (pv.FatkEf > pv.FdefEf * folga ? "#7dc95e" : "#e0b84a")
          : (pv.FdefEf > pv.FatkEf * folga ? "#e05a4a" : "#e0b84a");
        const rh = Math.max(8, cs * 0.52);
        ctx.save();
        ctx.shadowColor = corH; ctx.shadowBlur = Math.max(6, cs * 0.35);
        ctx.lineWidth = Math.max(2, cs * 0.09); ctx.strokeStyle = corH;
        ctx.globalAlpha = 0.9;
        ctx.beginPath(); ctx.arc(dx, dy, rh, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
      }

      // FORCA COMO TAMANHO: area do marcador ~ forca (comparavel de relance)
      const Fm = Engine.forcaDe(m.tropas, game.config);
      const r = Math.min(cs * 0.45, Math.max(3, cs * 0.14 * Math.sqrt(Fm / 50)));
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(mx, my, r, 0, Math.PI * 2); ctx.fill();
      ctx.lineWidth = 1.5; ctx.strokeStyle = "rgba(0,0,0,.65)"; ctx.stroke();

      // seta: para onde o exercito esta indo
      const ang = Math.atan2(dy - my, dx - mx);
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.moveTo(mx + Math.cos(ang) * (r + 7), my + Math.sin(ang) * (r + 7));
      ctx.lineTo(mx + Math.cos(ang + 2.5) * (r + 1), my + Math.sin(ang + 2.5) * (r + 1));
      ctx.lineTo(mx + Math.cos(ang - 2.5) * (r + 1), my + Math.sin(ang - 2.5) * (r + 1));
      ctx.closePath(); ctx.fill();
      ctx.lineWidth = 1; ctx.strokeStyle = "rgba(0,0,0,.5)"; ctx.stroke();

      // rotulo do exercito: icone do tipo sempre que da; NUMERO so de perto
      // (de longe, o TAMANHO do marcador ja conta a forca)
      if (cs > 16) {
        const td = Engine.tipoDominante(game, m.tropas);
        const rot = (cs > 28 ? Fm + " " : "") + (td ? GLIFO[td] : "");
        const fm = Math.max(10, cs * 0.26);
        ctx.font = `bold ${fm}px serif`; ctx.textAlign = "center";
        ctx.lineWidth = Math.max(2, fm * 0.24); ctx.strokeStyle = "rgba(20,12,4,.85)";
        if (cs > 28) ctx.strokeText(rot, mx, my - r - 4);
        ctx.fillStyle = col === COR.A ? "#bcd0ff" : "#ffc4c4";
        ctx.fillText(rot, mx, my - r - 4);
      }
    }

    // ===== EFEITOS: anel, pulso de conquista, dano flutuante, fim =====
    const agora = performance.now();
    efeitos = efeitos.filter((e) => agora - e.t0 < (e.dur || EFEITO_DUR));
    for (const e of efeitos) {
      const p = (agora - e.t0) / (e.dur || EFEITO_DUR);      // 0 -> 1

      if (e.fim) { // FIM DE PARTIDA: o mapa escurece e o vencedor domina a tela
        ctx.globalAlpha = Math.min(0.38, p * 1.2);
        ctx.fillStyle = "#0d0903";
        ctx.fillRect(0, 0, VW, VH);
        ctx.globalAlpha = Math.min(0.20, p * 0.6);
        ctx.fillStyle = e.cor;
        ctx.fillRect(0, 0, VW, VH);
        ctx.globalAlpha = 1;
        continue;
      }
      if (e.dano) { // numero de dano flutuante: sobe e esmaece
        const ex2 = e.x * cs + panX + cs / 2, ey2 = e.y * cs + panY + cs / 2;
        const fd = Math.max(11, cs * 0.30);
        ctx.globalAlpha = 1 - p;
        ctx.font = `bold ${fd}px Verdana`; ctx.textAlign = "center";
        ctx.lineWidth = Math.max(2, fd * 0.25); ctx.strokeStyle = "rgba(20,12,4,.9)";
        const yy = ey2 - cs * 0.6 - p * cs * 0.9;
        ctx.strokeText(e.dano, ex2, yy);
        ctx.fillStyle = e.cor;
        ctx.fillText(e.dano, ex2, yy);
        ctx.globalAlpha = 1;
        continue;
      }
      const ex = e.x * cs + panX + cs / 2, ey = e.y * cs + panY + cs / 2;
      const raio = Math.max(8, cs * 0.45) * (1 + p * 1.6);
      ctx.globalAlpha = (1 - p) * 0.9;
      ctx.lineWidth = Math.max(2, cs * 0.08);
      ctx.strokeStyle = e.cor;
      ctx.beginPath(); ctx.arc(ex, ey, raio, 0, Math.PI * 2); ctx.stroke();
      if (e.conq) {  // conquista: pulso preenchido na cor do novo dono
        ctx.globalAlpha = (1 - p) * 0.30;
        ctx.fillStyle = e.cor;
        ctx.beginPath(); ctx.arc(ex, ey, raio * 0.75, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
  }

  function updateGameHUD() {
    if (!game) return;
    const A = Engine.aldeiasDe(game, "A"), B = Engine.aldeiasDe(game, "B");
    const f = (lista) => lista.reduce((s, a) => s + Engine.forcaDe(a.tropas, game.config), 0);
    const fA = f(A), fB = f(B);
    const venc = Engine.checarVitoria(game);

    // paineis dos reis (updateGameHUD e o UNICO dono destes rotulos)
    const pre = emReplay ? "REPLAY \u00b7 " : "";
    document.getElementById("sbA-modelo").textContent = pre + etiquetaA;
    document.getElementById("sb-modelo").textContent = pre + etiquetaB;
    document.getElementById("sbA-stats").textContent = "forca " + fA + " \u00b7 " + A.length + " ald";
    document.getElementById("sbB-stats").textContent = "forca " + fB + " \u00b7 " + B.length + " ald";

    // placar de transmissao (topo, sempre visivel)
    document.getElementById("pt-turno").textContent = venc
      ? (venc === "empate" ? "EMPATE" : "\uD83C\uDFC6 REI " + venc)
      : "TURNO " + game.turno;
    document.getElementById("pt-a-f").textContent = fA;
    document.getElementById("pt-b-f").textContent = fB;
    document.getElementById("pt-a-ald").textContent = A.length + " ald";
    document.getElementById("pt-b-ald").textContent = B.length + " ald";
    document.getElementById("pt-a-mod").textContent = etiquetaA || "-";
    document.getElementById("pt-b-mod").textContent = etiquetaB || "-";
    document.getElementById("pt-fa").style.flexGrow = Math.max(fA, 1);
    document.getElementById("pt-fb").style.flexGrow = Math.max(fB, 1);
    document.getElementById("pt-pips").innerHTML = game.aldeias
      .map((a) => `<span class="pip ${a.dono || ""}"></span>`).join("");
  }

  // controles
  document.getElementById("gplay").addEventListener("click", () => (playing ? pause() : play()));
  document.getElementById("gstep").addEventListener("click", async () => {
    pause();
    if (!game || Engine.checarVitoria(game)) return;
    const vA = document.getElementById("gmodA").value, vB = document.getElementById("gmodB").value;
    if (vA === "gemini" || vB === "gemini") { if (!pedirChave()) return; }
    if (vA !== "burro" || vB !== "burro") await passoTurnoDuelo();
    else passoTurno();
  });
  document.getElementById("greset").addEventListener("click", novaPartida);
  document.getElementById("sb-toggle").addEventListener("click", () => document.body.classList.toggle("sb-closed"));
  document.getElementById("glog").addEventListener("click", baixarLogGemini);
  document.getElementById("greplaysave").addEventListener("click", baixarReplay);
  document.getElementById("greplayload").addEventListener("change", (ev) => {
    if (ev.target.files && ev.target.files[0]) { carregarReplay(ev.target.files[0]); ev.target.value = ""; }
  });
  document.getElementById("gcinema").addEventListener("click", alternarCinema);
  function alternarCinema() {
    const ligar = !document.body.classList.contains("cinema");
    document.body.classList.toggle("cinema", ligar);
    document.getElementById("gcinema").classList.toggle("ativo", ligar);
    // tela cheia deixa o modo obvio e e o que gravacao pede; se o navegador
    // negar (precisa de gesto), o modo segue valendo so com o chrome oculto
    try {
      if (ligar && document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(() => {});
      else if (!ligar && document.fullscreenElement && document.exitFullscreen) document.exitFullscreen().catch(() => {});
    } catch (e) {}
  }
  document.getElementById("grepPlay").addEventListener("click", () => {
    if (!rep) return;
    if (!playing && rep.idx >= rep.dados.frames.length) { rep.idx = 0; limparFeeds(); limparBanners(); }
    playing = !playing;
    atualizarProgresso();
  });
  document.getElementById("grepRestart").addEventListener("click", () => {
    if (!rep) return;
    rep.idx = 0; limparFeeds(); limparBanners(); efeitos = [];
    camAuto = true; document.getElementById("grepCam").classList.add("ativo");
    playing = true;
    atualizarProgresso();
  });
  document.getElementById("grepCam").addEventListener("click", () => {
    camAuto = !camAuto;
    document.getElementById("grepCam").classList.toggle("ativo", camAuto);
    if (!camAuto) camAlvo = null;
  });
  document.getElementById("grepSair").addEventListener("click", sairReplay);
  // os dois modos "Rei B = modelo" sao mutuamente exclusivos
  document.getElementById("gmodA").addEventListener("change", pause);
  document.getElementById("gmodB").addEventListener("change", pause);
  document.getElementById("gspeed").addEventListener("input", (e) => {
    speed = +e.target.value;
    if (playing) { pause(); play(); }
  });

  // ---------- Início ----------
  resize();
  novaPartida();
})();
</script>
</body>
</html>
