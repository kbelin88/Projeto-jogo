    ctx.beginPath();
    ctx.moveTo(x - w * 0.12, y); ctx.lineTo(sx, y - h * 0.85); ctx.lineTo(x + w * 1.12, y);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#241a10";                       // porta
    ctx.fillRect(sx - r * 0.10, y + h * 0.35, r * 0.20, h * 0.65);
  }

  // escudo do exercito em marcha (E2): peca na cor do rei — le-se
  // "tropa no tabuleiro", nao projetil. Arte heraldica de verdade e E5;
  // aqui e o slot minimo: escudo chapado + contorno.
  function desenharEscudo(x, y, r, col) {
    const w = r * 1.7, h = r * 2.1;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x - w / 2, y - h * 0.42);
    ctx.lineTo(x + w / 2, y - h * 0.42);
    ctx.quadraticCurveTo(x + w / 2, y + h * 0.12, x, y + h * 0.58);
    ctx.quadraticCurveTo(x - w / 2, y + h * 0.12, x - w / 2, y - h * 0.42);
    ctx.closePath();
    ctx.fillStyle = col; ctx.fill();
    ctx.lineWidth = Math.max(1.5, r * 0.16); ctx.strokeStyle = "rgba(20,12,4,.8)";
    ctx.stroke();
    ctx.lineWidth = Math.max(1, r * 0.09); ctx.strokeStyle = "rgba(255,255,255,.35)";
    ctx.beginPath();                                  // filete interno: relevo
    ctx.moveTo(x - w * 0.34, y - h * 0.30);
    ctx.lineTo(x + w * 0.34, y - h * 0.30);
    ctx.stroke();
    ctx.restore();
  }

  // desenha aldeias do jogo (cor do dono) + exercitos em transito
  // ---- TERRITORIO DE TRANSMISSAO: influencia pintada + CONTORNO ----
  // Direcao do handoff: "bordas de territorio com contorno (nao so
  // preenchimento)". Criterio de sempre: espectador leigo entende quem
  // manda onde em 3 segundos, sem legenda. Cache por turno+donos (so
  // recalcula quando a posse muda; ~20 aldeias x 9x9 celulas, barato).
  // Etapa 0: nomes ambiente sao texto orfao — ruido para o espectador.
  // O codigo fica (pode voltar como "nome so quando vira noticia").
  const NOMES_AMBIENTE = false;
  let territCache = { chave: "", cels: null };
  function territorioCelulas() {
    const chave = game.turno + ":" + game.aldeias.map((a) => a.dono || "n").join("");
    if (territCache.chave === chave) return territCache.cels;
    const cels = new Map(); // "x,y" -> { dono, d2 } (dono mais proximo vence)
    const R = 4;
    for (const a of game.aldeias) {
      if (a.dono === null) continue;
      for (let dy = -R; dy <= R; dy++) for (let dx = -R; dx <= R; dx++) {
        const d2 = dx * dx + dy * dy;
        if (d2 > R * R + 2) continue; // canto cortado: borda organica
        const k = (a.x + dx) + "," + (a.y + dy);
        const atual = cels.get(k);
        if (!atual || d2 < atual.d2) cels.set(k, { dono: a.dono, d2 });
      }
    }
    territCache = { chave, cels };
    return cels;
  }

  // PELE v2 (18/07): celulas "limpas" no entorno de cada aldeia — nelas a
  // decoracao (bosque/serra) NAO nasce, senao arvore/montanha brotam por cima
  // do predio. Posicoes das aldeias sao fixas na partida -> cache por assinatura.
  let decoClearCache = { sig: "", set: null };
  function decoClear() {
    if (!game) return null;
    const sig = game.aldeias.map((a) => a.x + "_" + a.y).join(";");
    if (decoClearCache.sig === sig) return decoClearCache.set;
    const set = new Set();
    for (const a of game.aldeias) {
      const cap = capitalIds.has(a.id);           // castelo ocupa mais que aldeia
      const rx = 2, up = cap ? 3 : 2, down = 1;   // sprite sobe -> folga maior p/ cima
      for (let dy = -up; dy <= down; dy++)
        for (let dx = -rx; dx <= rx; dx++) set.add((a.x + dx) + "," + (a.y + dy));
    }
    decoClearCache = { sig, set };
    return set;
  }

  // MOTOR #1 (render): pontos (em celulas) do caminho de um exercito e o ponto
  // atual pela fracao de progresso — o exercito ANDA pela estrada, nao pela reta.
  function pontosCaminho(m) {
    const cam = (m.caminho && m.caminho.length >= 2) ? m.caminho : [m.origemId, m.destinoId];
    const pts = [];
    for (const id of cam) { const a = game.aldeias.find((v) => v.id === id); if (a) pts.push({ x: a.x, y: a.y }); }
    return pts.length >= 2 ? pts : null;
  }
  function pontoNaRota(pts, prog) {
    const segs = []; let total = 0;
    for (let i = 0; i + 1 < pts.length; i++) { const d = Math.hypot(pts[i + 1].x - pts[i].x, pts[i + 1].y - pts[i].y); segs.push(d); total += d; }
    let alvo = Math.max(0, Math.min(1, prog)) * total;
    for (let i = 0; i < segs.length; i++) {
      if (alvo <= segs[i] || i === segs.length - 1) {
        const t = segs[i] > 0 ? Math.max(0, Math.min(1, alvo / segs[i])) : 0;
        return { x: lerp(pts[i].x, pts[i + 1].x, t), y: lerp(pts[i].y, pts[i + 1].y, t), seg: i };
      }
      alvo -= segs[i];
    }
    return { x: pts[pts.length - 1].x, y: pts[pts.length - 1].y, seg: pts.length - 2 };
  }

  function drawGame() {
    if (!game) return;
    const cs = TILE * scale;

    // AREA DE INFLUENCIA removida (pele v2, feedback Lucas 18/07): o veu de
    // territorio poluia o mapa. O placar/cabo-de-guerra no topo carrega o jogo;
    // o mapa vira paisagem. territorioCelulas() segue definida caso volte.

    for (const a of game.aldeias) {
      const sx = a.x * cs + panX + cs / 2, sy = a.y * cs + panY + cs / 2;
      if (sx < -60 || sy < -60 || sx > VW + 60 || sy > VH + 60) continue;
      const col = a.dono === null ? COR.neutra : COR[a.dono];
      const r = Math.max(20, cs * 0.59);
      const ehCapital = capitalIds.has(a.id); // so a capital inicial e castelo (aldeia tomada nao)

      // PELE v2 (feedback Lucas 18/07): MAPA LIMPO. Fora anel, numero de
      // tropas e selo — o placar no topo carrega a leitura do jogo. So a
      // CAPITAL do rei e castelo (o alvo da partida = tomar o castelo inimigo);
      // aldeia barbara dominada segue aldeia, marcada por BANDEIRA do time.
      // Sprite base-centro; fallback procedural quando ainda nao carregou.
      const sprB = ehCapital
        ? (SPR.castelo && SPR.castelo.pronto ? SPR.castelo : null)
        : (SPR.aldeia_neutra && SPR.aldeia_neutra.pronto ? SPR.aldeia_neutra : null);
      const larg = cs * (ehCapital ? 3.2 : 2.4);
      const yBase = sy + r * 0.5;                    // base-centro no pe do plot
      if (sprB) {
        // capital tingida na cor do dono (bandeiras vem azuis de fabrica);
        // aldeia = sprite cru (a bandeira marca a posse). Tinta cacheada por cor.
        desenharSprite(ehCapital ? spriteTintado(sprB, col) : sprB, sx, yBase, larg);
      } else if (r >= 15) {                          // fallback procedural
        if (ehCapital) desenharTorreao(sx, sy, r, col);
        else desenharCabana(sx, sy, r);
      }

      // BANDEIRA do time sobre a aldeia DOMINADA (nao-capital): a capital ja
      // veste a cor no proprio castelo, entao so as aldeias tomadas recebem.
      if (!ehCapital && a.dono !== null) {
        const alt = sprB ? larg * sprB.height / sprB.width : r * 2;
        desenharBandeira(sx, yBase - alt * 0.55, r * 1.25, col);
      }
    }

    for (const m of game.movimentos) {
      const o = game.aldeias.find((a) => a.id === m.origemId);
      const d = game.aldeias.find((a) => a.id === m.destinoId);
      if (!o || !d) continue;
      const prog = m.turnosTotal ? (m.turnosTotal - m.turnosRestantes) / m.turnosTotal : 1;
      const pts = pontosCaminho(m);                       // motor #1: segue a estrada
      const p = pts ? pontoNaRota(pts, prog) : { x: lerp(o.x, d.x, prog), y: lerp(o.y, d.y, prog), seg: 0 };
      const mx = p.x * cs + panX + cs / 2;
      const my = p.y * cs + panY + cs / 2;
      const dx = d.x * cs + panX + cs / 2, dy = d.y * cs + panY + cs / 2;
      const col = COR[m.dono];

      // ALERTA DE ATAQUE (E2): a 1 turno de chegar, halo na COR DO
      // ATACANTE marca o alvo — a ameaca tem dono, o desfecho fica em
      // aberto. Decisao de 16/07: previsao de resultado tira a tensao
      // do espectador (a conta do motor saiu da UI; segue no eval).
      if (m.turnosRestantes === 1 && d.dono !== m.dono && cs > 13) {
        const corH = col;
        const rh = Math.max(8, cs * 0.52);
        ctx.save();
        ctx.shadowColor = corH; ctx.shadowBlur = Math.max(6, cs * 0.35);
        ctx.lineWidth = Math.max(2, cs * 0.09); ctx.strokeStyle = corH;
        ctx.globalAlpha = 0.9;
        ctx.beginPath(); ctx.arc(dx, dy, rh, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
      }

      // FORCA COMO TAMANHO: area do marcador ~ forca (comparavel de relance)
      const Fm = Engine.forcaDe(m.tropas, game.config);
      const r = Math.min(cs * 0.45, Math.max(3, cs * 0.14 * Math.sqrt(Fm / 50)));

      // HIERARQUIA DE SETAS (Etapa 1): ataque = traco cheio, peso pela
      // forca, mais firme a 1 turno do impacto; reforco proprio =
      // pontilhado quase invisivel. Num turno com 15 marchas, so as que
      // importam gritam — o espectador ve DE ONDE, PARA ONDE e QUANTO.
      const ehAtaque = d && d.dono !== m.dono;
      ctx.save();
      ctx.beginPath(); ctx.moveTo(mx, my);              // motor #1: rota restante pela estrada
      if (pts) { for (let i = p.seg + 1; i < pts.length; i++) ctx.lineTo(pts[i].x * cs + panX + cs / 2, pts[i].y * cs + panY + cs / 2); }
      else ctx.lineTo(dx, dy);
      if (ehAtaque) {
        // E2: rota de ataque = pontilhado PRETO fino, do ponto atual ao
        // alvo. A cor mora no escudo; a linha so aponta. Firma a 1 turno.
        ctx.globalAlpha = m.turnosRestantes === 1 ? 0.60 : 0.42;
        ctx.lineWidth = Math.max(1, cs * 0.045);
        ctx.setLineDash([Math.max(2, cs * 0.12), Math.max(4, cs * 0.22)]);
        ctx.strokeStyle = "rgba(12,9,4,.9)";
      } else {
        ctx.globalAlpha = 0.13;
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 7]);
        ctx.strokeStyle = col;
      }
      ctx.stroke();
      ctx.restore();
      desenharEscudo(mx, my, r, col); // E2: a tropa e uma peca, nao um ponto

      // rotulo do exercito: icone do tipo sempre que da; NUMERO so de perto
      // (de longe, o TAMANHO do marcador ja conta a forca)
      if (cs > 16) {
        const td = Engine.tipoDominante(game, m.tropas);
        const rot = (cs > 28 ? Fm + " " : "") + (td ? GLIFO[td] : "");
        const fm = Math.max(10, cs * 0.26);
        ctx.font = `bold ${fm}px serif`; ctx.textAlign = "center";
        ctx.lineWidth = Math.max(2, fm * 0.24); ctx.strokeStyle = "rgba(20,12,4,.85)";
        if (cs > 28) ctx.strokeText(rot, mx, my - r - 4);
        ctx.fillStyle = col === COR.A ? "#bcd0ff" : "#ffc4c4";
        ctx.fillText(rot, mx, my - r - 4);
      }
    }

    // ===== EFEITOS: anel, pulso de conquista, dano flutuante, fim =====
    const agora = performance.now();
    efeitos = efeitos.filter((e) => agora - e.t0 < (e.dur || EFEITO_DUR));
    for (const e of efeitos) {
      const p = (agora - e.t0) / (e.dur || EFEITO_DUR);      // 0 -> 1

      if (e.fim) { // FIM DE PARTIDA: o mapa escurece e o vencedor domina a tela
        ctx.globalAlpha = Math.min(0.38, p * 1.2);
        ctx.fillStyle = "#0d0903";
        ctx.fillRect(0, 0, VW, VH);
        ctx.globalAlpha = Math.min(0.20, p * 0.6);
        ctx.fillStyle = e.cor;
        ctx.fillRect(0, 0, VW, VH);
        ctx.globalAlpha = 1;
        continue;
      }
      if (e.dano) { // numero de dano flutuante: sobe e esmaece
        const ex2 = e.x * cs + panX + cs / 2, ey2 = e.y * cs + panY + cs / 2;
        const fd = Math.max(11, cs * 0.30);
        ctx.globalAlpha = 1 - p;
        ctx.font = `bold ${fd}px Verdana`; ctx.textAlign = "center";
        ctx.lineWidth = Math.max(2, fd * 0.25); ctx.strokeStyle = "rgba(20,12,4,.9)";
        const yy = ey2 - cs * 0.6 - p * cs * 0.9;
        ctx.strokeText(e.dano, ex2, yy);
        ctx.fillStyle = e.cor;
        ctx.fillText(e.dano, ex2, yy);
        ctx.globalAlpha = 1;
        continue;
      }
      const ex = e.x * cs + panX + cs / 2, ey = e.y * cs + panY + cs / 2;
      const raio = Math.max(8, cs * 0.45) * (1 + p * 1.6);
      ctx.globalAlpha = (1 - p) * 0.9;
      ctx.lineWidth = Math.max(2, cs * 0.08);
      ctx.strokeStyle = e.cor;
      ctx.beginPath(); ctx.arc(ex, ey, raio, 0, Math.PI * 2); ctx.stroke();
      if (e.conq) {  // conquista: pulso preenchido + SEGUNDO anel em eco —
        // a explosao de cor NO lugar substitui o banner com nome orfao
        ctx.globalAlpha = (1 - p) * 0.30;
        ctx.fillStyle = e.cor;
        ctx.beginPath(); ctx.arc(ex, ey, raio * 0.75, 0, Math.PI * 2); ctx.fill();
        const p2 = Math.max(0, p - 0.22) / 0.78; // eco atrasado
        if (p2 > 0) {
          ctx.globalAlpha = (1 - p2) * 0.55;
          ctx.lineWidth = Math.max(1.5, cs * 0.05);
          ctx.beginPath(); ctx.arc(ex, ey, Math.max(8, cs * 0.45) * (1 + p2 * 2.4), 0, Math.PI * 2); ctx.stroke();
        }
      } else if (!e.dano) { // combate sem conquista: choque — 6 raios curtos
        ctx.globalAlpha = (1 - p) * 0.7;
        ctx.lineWidth = Math.max(1.5, cs * 0.06);
        for (let k = 0; k < 6; k++) {
          const ak = k * Math.PI / 3 + 0.35;
          ctx.beginPath();
          ctx.moveTo(ex + Math.cos(ak) * raio * 0.55, ey + Math.sin(ak) * raio * 0.55);
          ctx.lineTo(ex + Math.cos(ak) * raio * (0.55 + 0.45 * (1 - p)), ey + Math.sin(ak) * raio * (0.55 + 0.45 * (1 - p)));
          ctx.stroke();
        }
      }
      ctx.globalAlpha = 1;
    }
  }

  function updateGameHUD() {
    if (!game) return;
    const A = Engine.aldeiasDe(game, "A"), B = Engine.aldeiasDe(game, "B");
    const f = (lista) => lista.reduce((s, a) => s + Engine.forcaDe(a.tropas, game.config), 0);
    const fA = f(A), fB = f(B);
    const venc = Engine.checarVitoria(game);

    // ===== PLACAR UNICO: cabo de guerra (proporcao de aldeias) =====
    const nNeutras = Engine.aldeiasDe(game, null).length;
    const totAld = Math.max(1, A.length + B.length + nNeutras);
    const elCabo = document.getElementById("pt-cabo-a");
    if (elCabo) {
      // E2 final: SO os dois reis na barra — comecam meio a meio e se
      // empurram; neutras nao aparecem (quem ve entende a DISPUTA).
      const totReis = Math.max(1, A.length + B.length);
      const pA = 100 * A.length / totReis, pB = 100 - pA;
      // E2 fantasma (jogo de luta): o pedaco que um rei PERDEU fica
      // visivel esmaecendo ~1.5s — o espectador ve o golpe e a direcao.
      const cabo = document.getElementById("pt-cabo");
      if (cabo && caboAnt && game.turno > 0) {
        const fantasma = (cor, de, larg) => {
          if (larg < 0.5 || larg > 30) return; // ruido e resets nao assombram
          const g = document.createElement("div");
          g.className = "pt-cabo-ghost";
          g.style.left = de + "%"; g.style.width = larg + "%";
          g.style.background = cor;
          cabo.appendChild(g);
          requestAnimationFrame(() => requestAnimationFrame(() => { g.style.opacity = "0"; }));
          setTimeout(() => { if (g.remove) g.remove(); }, 1600); // mock dos smokes nao tem .remove
        };
        if (pA < caboAnt.pA) fantasma("#5d8cf0", pA, caboAnt.pA - pA);
        if (pB < caboAnt.pB) fantasma("#ef5d5d", 100 - caboAnt.pB, caboAnt.pB - pB);
      }
      caboAnt = { pA, pB };
      elCabo.style.flexBasis = pA + "%";
      document.getElementById("pt-cabo-b").style.flexBasis = pB + "%";
    }

    // F4 REMOVIDA (17/07): a virada e trabalho da NARRACAO na edicao
    // do video, nao do jogo. A barra de empurrao ja mostra a mare.

    // paineis dos reis (updateGameHUD e o UNICO dono destes rotulos)
    const pre = emReplay ? "REPLAY \u00b7 " : "";
    document.getElementById("sbA-modelo").textContent = pre + etiquetaA;
    document.getElementById("sb-modelo").textContent = pre + etiquetaB;
    document.getElementById("sbA-stats").textContent = "forca " + fA + " \u00b7 " + A.length + " ald";
    document.getElementById("sbB-stats").textContent = "forca " + fB + " \u00b7 " + B.length + " ald";

    // placar de transmissao (topo, sempre visivel)
    document.getElementById("pt-turno").textContent = venc
      ? (venc === "empate" ? "EMPATE" : "\uD83C\uDFC6 REI " + venc)
      : "TURNO " + game.turno;
    document.getElementById("pt-a-f").textContent = fA;
    document.getElementById("pt-b-f").textContent = fB;
    document.getElementById("pt-a-ald").textContent = A.length + " ald";
    document.getElementById("pt-b-ald").textContent = B.length + " ald";
    document.getElementById("pt-a-mod").textContent = etiquetaA || "-";
    document.getElementById("pt-b-mod").textContent = etiquetaB || "-";
  }

  // controles
  document.getElementById("gplay").addEventListener("click", () => (playing ? pause() : play()));
  document.getElementById("gstep").addEventListener("click", async () => {
    pause();
    if (!game || Engine.checarVitoria(game)) return;
    const vA = document.getElementById("gmodA").value, vB = document.getElementById("gmodB").value;
    if (vA === "gemini" || vB === "gemini") { if (!pedirChave()) return; }
    if (vA !== "burro" || vB !== "burro") await passoTurnoDuelo();
    else passoTurno();
  });
  document.getElementById("greset").addEventListener("click", novaPartida);
  const bcf = document.getElementById("cartaoFechar");
  if (bcf && bcf.addEventListener) bcf.addEventListener("click", fecharCartao);
  document.getElementById("sb-toggle").addEventListener("click", () => document.body.classList.toggle("sb-closed"));
  document.getElementById("glog").addEventListener("click", baixarLogGemini);
  document.getElementById("greplaysave").addEventListener("click", baixarReplay);
  document.getElementById("greplayload").addEventListener("change", (ev) => {
    if (ev.target.files && ev.target.files[0]) { carregarReplay(ev.target.files[0]); ev.target.value = ""; }
  });
  document.getElementById("gcinema").addEventListener("click", alternarCinema);
  function alternarCinema() {
    const ligar = !document.body.classList.contains("cinema");
    document.body.classList.toggle("cinema", ligar);
    document.getElementById("gcinema").classList.toggle("ativo", ligar);
    // tela cheia deixa o modo obvio e e o que gravacao pede; se o navegador
    // negar (precisa de gesto), o modo segue valendo so com o chrome oculto
    try {
      if (ligar && document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(() => {});
      else if (!ligar && document.fullscreenElement && document.exitFullscreen) document.exitFullscreen().catch(() => {});
    } catch (e) {}
  }
  document.getElementById("grepPlay").addEventListener("click", () => {
    if (!rep) return;
    if (!playing && rep.idx >= rep.dados.frames.length) { rep.idx = 0; limparFeeds(); limparBanners(); }
    playing = !playing;
    atualizarProgresso();
  });
  document.getElementById("grepRestart").addEventListener("click", () => {
    if (!rep) return;
    rep.idx = 0; limparFeeds(); limparBanners(); fecharCartao(); efeitos = [];
    camAuto = true; document.getElementById("grepCam").classList.add("ativo");
    playing = true;
    atualizarProgresso();
  });
  document.getElementById("grepCam").addEventListener("click", () => {
    camAuto = !camAuto;
    document.getElementById("grepCam").classList.toggle("ativo", camAuto);
    if (!camAuto) camAlvo = null;
  });
  document.getElementById("grepSair").addEventListener("click", sairReplay);
  // os dois modos "Rei B = modelo" sao mutuamente exclusivos
  document.getElementById("gmodA").addEventListener("change", pause);
  document.getElementById("gmodB").addEventListener("change", pause);
  document.getElementById("gspeed").addEventListener("input", (e) => {
    speed = +e.target.value;
    if (playing) { pause(); play(); }
  });

  // ---------- Início ----------
  resize();
  novaPartida();
})();
</script>
</body>
</html>
